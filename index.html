<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milkam Catbird Seat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1117;--ink2:#1c2333;--ink3:#2d3748;
  --fog:#8892a4;--mist:#c8d0dc;--border:#e2e0db;
  --paper:#f5f2ec;--cream:#faf8f4;--white:#ffffff;
  --gold:#c9973a;--gold-lt:#f5e9cc;--gold-dim:#3d2e10;
  --red:#b91c1c;--red-lt:#fef2f2;
  --green:#15803d;--green-lt:#f0fdf4;
  --amber:#b45309;--amber-lt:#fffbeb;
  --blue:#1d4ed8;--blue-lt:#eff6ff;
  --shadow:0 1px 3px rgba(13,17,23,.07),0 4px 16px rgba(13,17,23,.04);
  --shadow-lg:0 8px 32px rgba(13,17,23,.12);
  --radius:10px;
  --mono:'DM Mono',monospace;
  --serif:'Cormorant Garamond',serif;
  --sans:'DM Sans',sans-serif;
}
html{font-size:15px}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ── LOCK / SELECTOR SCREEN ── */
#entry-screen{
  position:fixed;inset:0;
  background:var(--ink);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:1000;
  transition:opacity .45s ease;
}
#entry-screen.hidden{opacity:0;pointer-events:none}

.entry-logo{font-family:var(--serif);font-size:2.6rem;color:var(--gold);letter-spacing:.02em;margin-bottom:.2rem}
.entry-tagline{font-family:var(--mono);font-size:.62rem;color:var(--fog);letter-spacing:.2em;text-transform:uppercase;margin-bottom:3rem}

/* Property Selector */
#prop-selector{display:flex;flex-direction:column;gap:.75rem;width:320px}
.prop-btn{
  display:flex;align-items:center;gap:1rem;
  padding:1rem 1.25rem;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  color:#fff;cursor:pointer;
  transition:all .15s ease;
  text-align:left;
}
.prop-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(201,151,58,.4)}
.prop-btn.owner-btn{border-color:rgba(201,151,58,.3);background:rgba(201,151,58,.06)}
.prop-btn.owner-btn:hover{background:rgba(201,151,58,.12)}
.prop-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.prop-icon.owner{background:rgba(201,151,58,.15)}
.prop-icon.wkfcw{background:rgba(29,78,216,.15)}
.prop-icon.rdurm{background:rgba(21,128,61,.15)}
.prop-icon.rdutt{background:rgba(180,83,9,.15)}
.prop-name{font-family:var(--sans);font-size:.9rem;font-weight:500;color:#fff;line-height:1.2}
.prop-code{font-family:var(--mono);font-size:.58rem;color:var(--fog);letter-spacing:.1em;margin-top:.15rem}
.prop-coming{font-family:var(--mono);font-size:.55rem;color:rgba(201,151,58,.6);letter-spacing:.08em;margin-left:auto;flex-shrink:0}

/* PIN Screen */
#pin-screen{display:none;flex-direction:column;align-items:center}
#pin-screen.show{display:flex}
.pin-back{
  font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--fog);background:none;border:none;
  cursor:pointer;margin-bottom:2rem;padding:.5rem 1rem;
  border:1px solid rgba(255,255,255,.08);border-radius:6px;
  transition:all .15s;
}
.pin-back:hover{color:var(--mist);border-color:rgba(255,255,255,.2)}
.pin-for{font-family:var(--serif);font-size:1.4rem;color:var(--gold);margin-bottom:.25rem}
.pin-label{font-family:var(--mono);font-size:.6rem;color:var(--fog);letter-spacing:.15em;text-transform:uppercase;margin-bottom:1.5rem}
.pin-dots{display:flex;gap:10px;margin-bottom:2rem}
.pin-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--fog);transition:all .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(201,151,58,.4)}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,58px);gap:9px}
.pin-key{width:58px;height:58px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-family:var(--sans);font-size:1.2rem;font-weight:300;cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center}
.pin-key:hover{background:rgba(255,255,255,.12)}
.pin-key:active{transform:scale(.92)}
.pin-key.wide{border-radius:29px;font-size:.7rem;letter-spacing:.1em}
.pin-err{font-family:var(--mono);font-size:.62rem;color:var(--red);letter-spacing:.1em;margin-top:1.25rem;opacity:0;transition:opacity .2s}
.pin-err.show{opacity:1}

/* ── APP SHELL ── */
#app{display:none}
#app.visible{display:block}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--ink);
  display:flex;align-items:center;
  padding:0 1.5rem;height:52px;gap:1.5rem;
}
.topbar-brand{font-family:var(--serif);font-size:1.1rem;color:var(--gold);flex-shrink:0;letter-spacing:.02em}
.topbar-prop-tag{
  font-family:var(--mono);font-size:.58rem;
  letter-spacing:.14em;text-transform:uppercase;
  padding:.25rem .65rem;border-radius:20px;
  flex-shrink:0;
}
.tag-owner{background:rgba(201,151,58,.15);color:var(--gold)}
.tag-wkfcw{background:rgba(29,78,216,.15);color:#93c5fd}
.tag-rdurm{background:rgba(21,128,61,.15);color:#86efac}
.tag-rdutt{background:rgba(180,83,9,.15);color:#fcd34d}

.topbar-nav{display:flex;gap:0;margin-left:auto}
.nav-btn{padding:0 .9rem;height:52px;border:none;background:none;color:var(--fog);font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;white-space:nowrap}
.nav-btn:hover{color:var(--mist)}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.topbar-actions{display:flex;gap:.5rem;margin-left:.75rem}
.topbar-action-btn{padding:0 .75rem;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--fog);font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.topbar-action-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block}

/* ── PAGE HEADER ── */
.page-header{padding:2rem 2rem 1.25rem;border-bottom:1px solid var(--border);background:var(--cream)}
.page-title{font-family:var(--serif);font-size:1.65rem;color:var(--ink);margin-bottom:.2rem}
.page-sub{font-family:var(--mono);font-size:.6rem;color:var(--fog);letter-spacing:.12em;text-transform:uppercase}

/* ── CONTENT ── */
.content{padding:1.75rem 2rem;max-width:1440px;margin:0 auto}
@media(max-width:900px){.content{padding:1rem}}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1rem;margin-bottom:1.75rem}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.4rem;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.gold::before{background:var(--gold)}
.kpi-card.green::before{background:var(--green)}
.kpi-card.blue::before{background:var(--blue)}
.kpi-card.red::before{background:var(--red)}
.kpi-card.amber::before{background:var(--amber)}
.kpi-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.13em;text-transform:uppercase;color:var(--fog);margin-bottom:.4rem}
.kpi-value{font-family:var(--serif);font-size:1.8rem;color:var(--ink);line-height:1;margin-bottom:.35rem}
.kpi-delta{font-family:var(--mono);font-size:.6rem}
.kpi-delta.up{color:var(--green)}
.kpi-delta.down{color:var(--red)}
.kpi-delta.flat{color:var(--fog)}
.kpi-meta{font-family:var(--mono);font-size:.57rem;color:var(--mist);margin-top:.15rem}

/* ── SECTION CARDS ── */
.section-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:1.5rem;overflow:hidden}
.section-head{padding:.875rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--cream);gap:1rem}
.section-title{font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:500}
.section-badge{font-family:var(--mono);font-size:.58rem;padding:.18rem .55rem;border-radius:20px;letter-spacing:.07em;white-space:nowrap}
.badge-ok{background:var(--green-lt);color:var(--green)}
.badge-warn{background:var(--amber-lt);color:var(--amber)}
.badge-alert{background:var(--red-lt);color:var(--red)}
.badge-info{background:var(--blue-lt);color:var(--blue)}
.badge-gold{background:var(--gold-lt);color:var(--gold-dim)}

/* ── ALERT STRIP ── */
.alert-strip{display:flex;gap:.6rem;flex-wrap:wrap;padding:.65rem 1.4rem;border-bottom:1px solid var(--border);min-height:42px;align-items:center}
.alert-chip{display:flex;align-items:center;gap:.35rem;padding:.25rem .7rem;border-radius:20px;font-family:var(--mono);font-size:.6rem;letter-spacing:.05em;font-weight:500}
.alert-chip.warn{background:var(--amber-lt);color:var(--amber);border:1px solid rgba(180,83,9,.2)}
.alert-chip.alert{background:var(--red-lt);color:var(--red);border:1px solid rgba(185,28,28,.2)}
.alert-chip.ok{background:var(--green-lt);color:var(--green);border:1px solid rgba(21,128,61,.2)}
.alert-chip.info{background:var(--blue-lt);color:var(--blue);border:1px solid rgba(29,78,216,.2)}

/* ── DATE NAV ── */
.date-nav{display:flex;align-items:center;gap:.65rem;padding:.875rem 1.4rem;border-bottom:1px solid var(--border);background:var(--cream)}
.date-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--ink3);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.date-btn:hover{border-color:var(--gold);color:var(--gold)}
.date-display{font-family:var(--mono);font-size:.72rem;color:var(--ink);letter-spacing:.05em;min-width:130px}
.date-today-btn{padding:0 .7rem;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--fog);font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.date-today-btn:hover{border-color:var(--gold);color:var(--gold)}
.spacer{flex:1}

/* ── TABLES ── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-family:var(--mono);font-size:.57rem;letter-spacing:.11em;text-transform:uppercase;color:var(--fog);padding:.7rem 1rem;text-align:left;border-bottom:1px solid var(--border);background:var(--cream);white-space:nowrap}
.data-table th.r{text-align:right}
.data-table td{padding:.65rem 1rem;font-size:.85rem;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table td.r{text-align:right;font-family:var(--mono);font-size:.78rem}
.data-table td.mono{font-family:var(--mono);font-size:.75rem}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--cream)}
.data-table tr.tot td{font-weight:600;background:var(--cream);border-top:2px solid var(--border)}
.tbl-wrap{overflow-x:auto}

/* ── AGING BARS ── */
.aging-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1px;background:var(--border)}
.aging-cell{background:var(--white);padding:1.25rem 1.4rem}
.aging-co{font-family:var(--mono);font-size:.58rem;letter-spacing:.13em;text-transform:uppercase;color:var(--fog);margin-bottom:.65rem}
.aging-tot{font-family:var(--serif);font-size:1.45rem;color:var(--ink);margin-bottom:.75rem}
.aging-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.35rem}
.aging-lbl{font-family:var(--mono);font-size:.56rem;color:var(--fog);width:48px;flex-shrink:0;letter-spacing:.05em}
.aging-track{flex:1;height:5px;background:var(--paper);border-radius:3px;overflow:hidden}
.aging-fill{height:100%;border-radius:3px;transition:width .6s ease}
.fill-cur{background:var(--green)}
.fill-30{background:var(--amber)}
.fill-60{background:#f97316}
.fill-90{background:var(--red)}
.fill-120{background:#991b1b}
.fill-150{background:#4c0519}
.aging-val{font-family:var(--mono);font-size:.58rem;color:var(--ink3);width:70px;text-align:right;flex-shrink:0}

/* ── UPLOAD ── */
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:2.25rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--cream);position:relative}
.upload-area:hover,.upload-area.dragover{border-color:var(--gold);background:rgba(201,151,58,.03)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:1.8rem;margin-bottom:.6rem;opacity:.4}
.upload-title{font-family:var(--mono);font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:.3rem}
.upload-sub{font-size:.8rem;color:var(--fog)}
.upload-results{margin-top:1.25rem;display:flex;flex-direction:column;gap:.45rem}
.upload-item{display:flex;align-items:center;gap:.65rem;padding:.65rem .9rem;background:var(--white);border:1px solid var(--border);border-radius:8px}
.upload-item-name{flex:1;font-family:var(--mono);font-size:.68rem;color:var(--ink3)}
.upload-item-type{font-family:var(--mono);font-size:.57rem;padding:.13rem .5rem;border-radius:20px;letter-spacing:.05em}
.type-ok{background:var(--green-lt);color:var(--green)}
.type-unk{background:var(--amber-lt);color:var(--amber)}
.type-err{background:var(--red-lt);color:var(--red)}
.upload-item-note{font-family:var(--mono);font-size:.6rem;color:var(--fog)}
.upload-commit{margin-top:1.1rem;padding:.8rem 1.75rem;background:var(--ink);color:var(--gold);border:none;border-radius:8px;font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.upload-commit:hover{background:var(--ink2)}
.upload-commit:disabled{opacity:.4;cursor:not-allowed}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:.9rem;padding:1.4rem}
.form-group{display:flex;flex-direction:column;gap:.35rem}
.form-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fog)}
.form-input{padding:.55rem .7rem;border:1px solid var(--border);border-radius:6px;font-family:var(--mono);font-size:.78rem;background:var(--white);color:var(--ink);transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-actions{padding:0 1.4rem 1.4rem;display:flex;gap:.65rem}
.btn-primary{padding:.6rem 1.4rem;background:var(--ink);color:var(--gold);border:none;border-radius:7px;font-family:var(--mono);font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:var(--ink2)}
.btn-sec{padding:.6rem 1.4rem;background:transparent;color:var(--fog);border:1px solid var(--border);border-radius:7px;font-family:var(--mono);font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-sec:hover{border-color:var(--ink3);color:var(--ink3)}

/* ── TABS ── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 1.4rem;background:var(--cream)}
.tab-btn{padding:.7rem 1.1rem;border:none;background:none;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fog);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn:hover{color:var(--ink3)}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--gold)}
.tab-content{display:none;padding:1.4rem}
.tab-content.active{display:block}

/* ── GRID LAYOUTS ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.5rem}
@media(max-width:960px){.two-col,.three-col{grid-template-columns:1fr}}

/* ── OWNER SUMMARY CARDS ── */
.prop-summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.25rem;margin-bottom:1.75rem}
.prop-summary-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:all .2s}
.prop-summary-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.psc-header{padding:.875rem 1.25rem;display:flex;align-items:center;gap:.75rem}
.psc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-wkfcw{background:#3b82f6}
.dot-rdurm{background:#22c55e}
.dot-rdutt{background:#f59e0b}
.psc-name{font-weight:600;font-size:.9rem}
.psc-code{font-family:var(--mono);font-size:.58rem;color:var(--fog);letter-spacing:.1em}
.psc-body{padding:1rem 1.25rem;border-top:1px solid var(--border)}
.psc-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.75rem}
.psc-kpi{text-align:center}
.psc-kpi-val{font-family:var(--serif);font-size:1.2rem;color:var(--ink)}
.psc-kpi-lbl{font-family:var(--mono);font-size:.52rem;color:var(--fog);letter-spacing:.08em;text-transform:uppercase}
.psc-footer{padding:.65rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.psc-foot-lbl{font-family:var(--mono);font-size:.58rem;color:var(--fog);letter-spacing:.08em}
.psc-foot-val{font-family:var(--mono);font-size:.7rem;font-weight:500;color:var(--ink3)}
.psc-coming{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--fog);font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase}

/* ── PILL ── */
.pill{display:inline-block;padding:.12rem .5rem;border-radius:20px;font-family:var(--mono);font-size:.56rem;letter-spacing:.05em;font-weight:500}
.pill-red{background:var(--red-lt);color:var(--red)}
.pill-green{background:var(--green-lt);color:var(--green)}
.pill-amber{background:var(--amber-lt);color:var(--amber)}
.pill-blue{background:var(--blue-lt);color:var(--blue)}
.pill-gray{background:var(--paper);color:var(--fog);border:1px solid var(--border)}
.pill-gold{background:var(--gold-lt);color:var(--gold-dim)}

/* ── MONTH BAR ── */
.month-bar{display:inline-block;height:7px;background:var(--gold);border-radius:2px;opacity:.65;vertical-align:middle}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:2.5rem 2rem;color:var(--fog)}
.empty-icon{font-size:2rem;margin-bottom:.75rem;opacity:.3}
.empty-title{font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.4rem;color:var(--ink3)}
.empty-sub{font-size:.82rem;color:var(--fog)}

/* ── LOADING ── */
.loading{display:flex;align-items:center;gap:.5rem;padding:1.75rem;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;color:var(--fog)}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease infinite}
.pdot:nth-child(2){animation-delay:.2s}
.pdot:nth-child(3){animation-delay:.4s}

/* ── COMING SOON ── */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center}
.coming-soon-badge{font-family:var(--mono);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.3rem .9rem;border-radius:20px;background:var(--amber-lt);color:var(--amber);margin-bottom:1.25rem}
.coming-soon-title{font-family:var(--serif);font-size:1.5rem;color:var(--ink);margin-bottom:.5rem}
.coming-soon-sub{font-size:.85rem;color:var(--fog);max-width:360px}

/* ── TOAST ── */

async function sbGet(table, qs=''){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${qs}`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(table, data, conflict){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?on_conflict=${conflict}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
    body: JSON.stringify(Array.isArray(data)?data:[data])
  });
  if(!r.ok) throw new Error(await r.text());
}
async function sbPost(table, data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body: JSON.stringify(Array.isArray(data)?data:[data])
  });
  if(!r.ok) throw new Error(await r.text());
}

let pinEntry='', pinTarget=null;

document.getElementById('prop-selector').addEventListener('click', e=>{
  const btn = e.target.closest('.prop-btn');
  if(!btn) return;
  pinTarget = btn.dataset.prop;
  document.getElementById('pin-for-label').textContent =
    pinTarget==='OWNER' ? 'Owner View' : PROPS[pinTarget]?.short || pinTarget;
  document.getElementById('prop-selector-wrap').style.display='none';
  document.getElementById('pin-screen').classList.add('show');
  pinEntry=''; updateDots();
});

document.getElementById('pin-back-btn').addEventListener('click', ()=>{
  document.getElementById('pin-screen').classList.remove('show');
  document.getElementById('prop-selector-wrap').style.display='';
  pinEntry=''; updateDots();
});

document.querySelector('.pin-pad').addEventListener('click', e=>{
  const btn = e.target.closest('.pin-key');
  if(!btn) return;
  handlePinKey(btn.dataset.k);
});

document.addEventListener('keydown', e=>{
  if(!document.getElementById('pin-screen').classList.contains('show')) return;
  if(e.key>='0'&&e.key<='9') handlePinKey(e.key);
  else if(e.key==='Backspace') handlePinKey('del');
  else if(e.key==='Escape') handlePinKey('clr');
});

function handlePinKey(k){
  if(k==='clr'){pinEntry='';updateDots();return}
  if(k==='del'){pinEntry=pinEntry.slice(0,-1);updateDots();return}
  if(pinEntry.length>=4) return;
  pinEntry+=k; updateDots();
  if(pinEntry.length===4){
    if(pinEntry===PINS[pinTarget]) enterApp(pinTarget);
    else pinError();
  }
}

function updateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    d.className='pin-dot'+(i<pinEntry.length?' filled':'');
  }
}
function pinError(){
  for(let i=0;i<4;i++) document.getElementById('pd'+i).className='pin-dot error';
  document.getElementById('pin-err').classList.add('show');
  setTimeout(()=>{
    pinEntry=''; updateDots();
    document.getElementById('pin-err').classList.remove('show');
  },800);
}

function enterApp(mode){
  S.mode = mode;
  document.getElementById('entry-screen').classList.add('hidden');
  setTimeout(()=>document.getElementById('entry-screen').style.display='none', 450);
  document.getElementById('app').classList.add('visible');

}

function switchProp(){

function lockApp(){

// ═══════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════
async function loadAllData(){
  const prop = S.mode;
  const isOwner = prop==='OWNER';
  const propFilter = isOwner ? '' : `&property=eq.${prop}`;

  try {
    const [daily, ar, overrides, adjs, inhouse, monthly] = await Promise.all([
      sbGet('daily_revenue', `?order=date.desc&limit=400${propFilter}`),
      sbGet('ar_aging',      `?order=date.desc&limit=120${propFilter}`),
      sbGet('rate_overrides',`?order=stay_date.desc&limit=600${propFilter}`),
      sbGet('adjustments',   `?order=date.desc&limit=600${propFilter}`),
      sbGet('inhouse_balances',`?order=date.desc&limit=300${propFilter}`),
      sbGet('monthly_revenue',`?order=period_start.asc${propFilter}`)
    ]);
    S.daily={}; daily.forEach(r=>{ const k=`${r.property||'WKFCW'}_${r.date}`; S.daily[k]=r; });
    S.ar=ar; S.overrides=overrides; S.adjs=adjs; S.inhouse=inhouse; S.monthly=monthly;
  } catch(e){ console.warn('Load error:',e); }
}

function dailyRow(date, prop){
  const p = prop || S.mode;
  return S.daily[`${p}_${date}`] || null;
}
function propDaily(prop){
  return Object.values(S.daily).filter(r=>r.property===prop);
}
function allDaily(){
  return Object.values(S.daily);
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
const fmt$ = n => n==null?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => n==null?'—':Number(n).toFixed(2)+'%';
const fmtN = n => n==null?'—':Number(n).toLocaleString('en-US');
const fmtDate = d => { if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); };
const fmtMonth = d => { if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',year:'numeric'}); };
const loading = () => `<div class="loading"><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div><span>Loading...</span></div>`;
const empty = (title,sub) => `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;

function deltaChip(curr, prev){
  if(!curr||!prev||prev===0) return '';
  const d = ((curr-prev)/Math.abs(prev)*100).toFixed(1);
  const cls = d>0?'up':d<0?'down':'flat';
  const arrow = d>0?'▲':d<0?'▼':'—';
  return `<span class="kpi-delta ${cls}">${arrow} ${Math.abs(d)}% vs LY</span>`;
}

function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`show ${type}`;
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ═══════════════════════════════════════════
// ── OWNER VIEWS ──
// ═══════════════════════════════════════════
function buildOwnerSummary(){
  const cards = Object.entries(PROPS).map(([code, p])=>{
    if(!p.active) return `
      <div class="prop-summary-card" data-prop="${code}">
        <div class="psc-header">
          <div class="psc-dot dot-${code.toLowerCase()}"></div>
          <div><div class="psc-name">${p.short}</div><div class="psc-code">${code} · ${p.pms}</div></div>
        </div>
        <div class="psc-coming">Coming Soon — ${p.pms} integration pending</div>
      </div>`;

    const rows = propDaily(code).sort((a,b)=>a.date.localeCompare(b.date));
    const today = rows[rows.length-1];
    const month = rows[0]?.date.slice(0,7);
    const mtd = rows.filter(r=>r.date.startsWith(month||''));
    const mtdRev = mtd.reduce((s,r)=>s+(r.room_revenue||0),0);
    const avgOcc = mtd.length ? mtd.reduce((s,r)=>s+(r.occ_pct||0),0)/mtd.length : null;
    const avgADR = mtd.length ? mtd.reduce((s,r)=>s+(r.adr||0),0)/mtd.length : null;
    const lyMtdRev = mtd.reduce((s,r)=>s+(r.ly_room_revenue||0),0);
    const revChg = mtdRev && lyMtdRev ? ((mtdRev-lyMtdRev)/lyMtdRev*100).toFixed(1) : null;

    return `
      <div class="prop-summary-card" data-prop="${code}">
        <div class="psc-header">
          <div class="psc-dot dot-${code.toLowerCase()}"></div>
          <div><div class="psc-name">${p.short}</div><div class="psc-code">${code} · ${p.pms}</div></div>
        </div>
        <div class="psc-body">
          <div class="psc-kpi-row">
            <div class="psc-kpi"><div class="psc-kpi-val">${today?fmtPct(today.occ_pct):'—'}</div><div class="psc-kpi-lbl">Today Occ</div></div>
            <div class="psc-kpi"><div class="psc-kpi-val">${today?fmt$(today.adr):'—'}</div><div class="psc-kpi-lbl">Today ADR</div></div>
            <div class="psc-kpi"><div class="psc-kpi-val">${fmt$(mtdRev||null)}</div><div class="psc-kpi-lbl">MTD Rev</div></div>
          </div>
          ${revChg ? `<div style="font-family:var(--mono);font-size:.6rem;color:${revChg>0?'var(--green)':'var(--red)'}">MTD Rev vs LY: ${revChg>0?'+':''}${revChg}%</div>` : ''}
        </div>
        <div class="psc-footer">
          <span class="psc-foot-lbl">Avg Occ MTD</span><span class="psc-foot-val">${fmtPct(avgOcc)}</span>
          <span class="psc-foot-lbl" style="margin-left:1rem">Avg ADR MTD</span><span class="psc-foot-val">${fmt$(avgADR)}</span>
        </div>
      </div>`;
  }).join('');

  // Combined KPIs
  const allRows = allDaily();
  const todayStr = S.currentDate;
  const curMonth = todayStr.slice(0,7);
  const curYear  = todayStr.slice(0,4);
  const mtdAll = allRows.filter(r=>r.date.startsWith(curMonth));
  const ytdAll = allRows.filter(r=>r.date.startsWith(curYear));
  const mtdRevAll = mtdAll.reduce((s,r)=>s+(r.room_revenue||0),0);
  const ytdRevAll = ytdAll.reduce((s,r)=>s+(r.room_revenue||0),0);
  const lyMtdAll  = mtdAll.reduce((s,r)=>s+(r.ly_room_revenue||0),0);

  // AR totals
  const latestARDate = S.ar[0]?.date;
  const latestAR = latestARDate ? S.ar.filter(r=>r.date===latestARDate) : [];
  const arTotal = latestAR.reduce((s,r)=>s+(r.total||0),0);
  const ar90plus = latestAR.reduce((s,r)=>s+(r.over_90||0)+(r.over_120||0)+(r.over_150||0),0);

  return `
    <div class="page-header">
      <div class="page-title">Owner Overview</div>
      <div class="page-sub">All Properties · ${fmtDate(todayStr)}</div>
    </div>
    <div class="content">
      <div class="kpi-grid">
        <div class="kpi-card gold">
          <div class="kpi-label">MTD Room Revenue</div>
          <div class="kpi-value">${fmt$(mtdRevAll||null)}</div>
          ${lyMtdAll>0?deltaChip(mtdRevAll,lyMtdAll):''}
          <div class="kpi-meta">All active properties</div>
        </div>
        <div class="kpi-card blue">
          <div class="kpi-label">YTD Room Revenue</div>
          <div class="kpi-value">${fmt$(ytdRevAll||null)}</div>
          <div class="kpi-meta">${curYear} to date</div>
        </div>
        <div class="kpi-card ${ar90plus>50000?'red':'amber'}">
          <div class="kpi-label">Total AR Outstanding</div>
          <div class="kpi-value">${fmt$(arTotal||null)}</div>
          <div class="kpi-meta">90+ days: ${fmt$(ar90plus||null)}</div>
        </div>
        <div class="kpi-card amber">
          <div class="kpi-label">Rate Override Impact MTD</div>
          <div class="kpi-value">${fmt$(S.overrides.filter(r=>r.stay_date?.startsWith(curMonth)).reduce((s,r)=>s+(r.override_amount||0),0)||null)}</div>
          <div class="kpi-meta">${S.overrides.filter(r=>r.stay_date?.startsWith(curMonth)).length} overrides</div>
        </div>
      </div>
      <div class="prop-summary-grid" id="prop-cards">${cards}</div>
    </div>`;
}

function wireOwnerSummary(){
  document.querySelectorAll('.prop-summary-card[data-prop]').forEach(card=>{
    const code = card.dataset.prop;
    if(PROPS[code]?.active){
      card.addEventListener('click', ()=>{
        // Switch to that property view (owner stays logged in, just scopes view)
        toast(`Viewing ${code} data`, 'info');
      });
    }
  });
}

function buildOwnerAR(){
  if(!S.ar.length) return `<div class="page-header"><div class="page-title">AR / Aging</div></div><div class="content">${empty('No AR data','Upload Direct Bill Aging reports')}</div>`;
  const latestDate = S.ar[0].date;
  const rows = S.ar.filter(r=>r.date===latestDate);
  const total = rows.reduce((s,r)=>s+(r.total||0),0);
  const arByProp = {};
  rows.forEach(r=>{ if(!arByProp[r.property]) arByProp[r.property]=0; arByProp[r.property]+=(r.total||0); });

  return `
    <div class="page-header">
      <div class="page-title">AR / Aging — All Properties</div>
      <div class="page-sub">Total outstanding: ${fmt$(total)} · As of ${fmtDate(latestDate)}</div>
    </div>
    <div class="content">
      <div class="section-card">
        <div class="section-head"><div class="section-title">Direct Bill Aging by Property</div><div class="section-badge badge-alert">${fmt$(total)} total</div></div>
        <div class="aging-grid">${rows.map(r=>agingCellHtml(r)).join('')}</div>
      </div>
      <div class="section-card">
        <div class="section-head"><div class="section-title">Day-over-Day Trend</div></div>
        ${buildARTrendTable()}
      </div>
    </div>`;
}

function buildOwnerPerf(){
  return `
    <div class="page-header">
      <div class="page-title">Performance — All Properties</div>
      <div class="page-sub">Monthly revenue history</div>
    </div>

function wireDaily(){
  document.getElementById('d-label').textContent = fmtDate(S.currentDate);
  document.getElementById('d-prev').addEventListener('click',()=>{
    const d=new Date(S.currentDate+'T00:00:00'); d.setDate(d.getDate()-1);
    S.currentDate=d.toISOString().slice(0,10);
    document.getElementById('d-label').textContent=fmtDate(S.currentDate);
    renderDailyContent();
  });
  document.getElementById('d-next').addEventListener('click',()=>{
    const d=new Date(S.currentDate+'T00:00:00'); d.setDate(d.getDate()+1);

    document.getElementById('d-label').textContent=fmtDate(S.currentDate);
    renderDailyContent();
  });
  document.getElementById('d-today').addEventListener('click',()=>{

function renderDailyContent(){
  const d = S.currentDate;
  const prop = S.mode;
  const row = dailyRow(d, prop);
  const dayOvr = S.overrides.filter(r=>r.stay_date===d && r.property===prop);
  const dayAdj = S.adjs.filter(r=>r.date===d && r.property===prop);
  const refunds = dayAdj.filter(r=>r.transaction_type==='REFUND');
  const mgrDisc = dayAdj.filter(r=>r.reason_code==='MANAGER_DISCRETION');
  const ovrNet  = dayOvr.reduce((s,r)=>s+(r.override_amount||0),0);
  const latestAR = S.ar.filter(r=>r.property===prop);
  const arTotal  = latestAR.length ? latestAR.slice(0,2).reduce((s,r)=>s+(r.total||0),0) : 0;

  // Alerts
  const alerts = [];
  if(dayOvr.length)   alerts.push(`<div class="alert-chip ${ovrNet<-100?'alert':'warn'}">⚡ ${dayOvr.length} override${dayOvr.length>1?'s':''} — net ${fmt$(ovrNet)}</div>`);
  if(refunds.length)  alerts.push(`<div class="alert-chip alert">↩ ${refunds.length} refund${refunds.length>1?'s':''} — ${fmt$(refunds.reduce((s,r)=>s+Math.abs(r.adjusted_amount||0),0))}</div>`);
  if(mgrDisc.length)  alerts.push(`<div class="alert-chip warn">🔑 ${mgrDisc.length} manager discretion</div>`);
  if(arTotal>160000)  alerts.push(`<div class="alert-chip alert">🏦 AR Total ${fmt$(arTotal)}</div>`);
  if(!alerts.length)  alerts.push(`<div class="alert-chip ok">✓ No flags for this date</div>`);
  document.getElementById('d-alerts').innerHTML = alerts.join('');
  document.getElementById('d-src').textContent = row ? 'Source: HotelKey Daily' : '';

  // KPIs
  if(row){
    document.getElementById('d-kpis').innerHTML = `
      <div class="kpi-card gold"><div class="kpi-label">Occupancy</div><div class="kpi-value">${fmtPct(row.occ_pct)}</div>${deltaChip(row.occ_pct,row.ly_occ_pct)}<div class="kpi-meta">LY: ${fmtPct(row.ly_occ_pct)}</div></div>
      <div class="kpi-card green"><div class="kpi-label">ADR</div><div class="kpi-value">${fmt$(row.adr)}</div>${deltaChip(row.adr,row.ly_adr)}<div class="kpi-meta">LY: ${fmt$(row.ly_adr)}</div></div>
      <div class="kpi-card blue"><div class="kpi-label">RevPAR</div><div class="kpi-value">${fmt$(row.revpar)}</div><div class="kpi-meta">${fmtN(row.rooms_sold)} / ${fmtN(row.rooms_available)} rooms</div></div>
      <div class="kpi-card gold"><div class="kpi-label">Room Revenue</div><div class="kpi-value">${fmt$(row.room_revenue)}</div>${deltaChip(row.room_revenue,row.ly_room_revenue)}<div class="kpi-meta">LY: ${fmt$(row.ly_room_revenue)}</div></div>
      <div class="kpi-card amber"><div class="kpi-label">Misc Revenue</div><div class="kpi-value">${fmt$(row.misc_revenue)}</div><div class="kpi-meta">Total: ${fmt$(row.total_revenue)}</div></div>`;
  } else {
    document.getElementById('d-kpis').innerHTML = `<div style="grid-column:1/-1">${empty('No data for '+fmtDate(d),'Upload the Hotel Statistics report for this date')}</div>`;
  }

  // MTD
  const [yr,mo] = d.split('-');
  const mtdRows = Object.values(S.daily).filter(r=>r.property===prop && r.date.startsWith(`${yr}-${mo}`));
  if(mtdRows.length){
    const mtdRev  = mtdRows.reduce((s,r)=>s+(r.room_revenue||0),0);
    const mtdMisc = mtdRows.reduce((s,r)=>s+(r.misc_revenue||0),0);
    const mtdOcc  = mtdRows.reduce((s,r)=>s+(r.occ_pct||0),0)/mtdRows.length;
    const mtdADR  = mtdRows.reduce((s,r)=>s+(r.adr||0),0)/mtdRows.length;
    const lyMtd   = mtdRows.reduce((s,r)=>s+(r.ly_room_revenue||0),0);
    document.getElementById('mtd-badge').textContent = `${mtdRows.length} days`;
    document.getElementById('mtd-body').innerHTML = `<table class="data-table">
      <tr><td>Room Revenue</td><td class="r">${fmt$(mtdRev)}</td></tr>
      <tr><td>Misc Revenue</td><td class="r">${fmt$(mtdMisc)}</td></tr>
      <tr class="tot"><td>Total Revenue</td><td class="r">${fmt$(mtdRev+mtdMisc)}</td></tr>
      <tr><td>Avg Occupancy</td><td class="r">${fmtPct(mtdOcc)}</td></tr>
      <tr><td>Avg ADR</td><td class="r">${fmt$(mtdADR)}</td></tr>
      ${lyMtd>0?`<tr><td>LY Room Revenue</td><td class="r" style="color:var(--fog)">${fmt$(lyMtd)} ${deltaChip(mtdRev,lyMtd)}</td></tr>`:''}
    </table>`;
  } else {
    document.getElementById('mtd-body').innerHTML = empty('No MTD data','No daily records for this month yet');
    document.getElementById('mtd-badge').textContent = '0 days';
  }

  // YTD
  const ytdRows = Object.values(S.daily).filter(r=>r.property===prop && r.date.startsWith(yr));
  if(ytdRows.length){
    const ytdRev  = ytdRows.reduce((s,r)=>s+(r.room_revenue||0),0);
    const ytdMisc = ytdRows.reduce((s,r)=>s+(r.misc_revenue||0),0);
    const ytdOcc  = ytdRows.reduce((s,r)=>s+(r.occ_pct||0),0)/ytdRows.length;
    const ytdADR  = ytdRows.reduce((s,r)=>s+(r.adr||0),0)/ytdRows.length;
    const lyYtd   = ytdRows.reduce((s,r)=>s+(r.ly_room_revenue||0),0);
    document.getElementById('ytd-badge').textContent = `${ytdRows.length} days`;
    document.getElementById('ytd-body').innerHTML = `<table class="data-table">
      <tr><td>Room Revenue</td><td class="r">${fmt$(ytdRev)}</td></tr>
      <tr><td>Misc Revenue</td><td class="r">${fmt$(ytdMisc)}</td></tr>
      <tr class="tot"><td>Total Revenue</td><td class="r">${fmt$(ytdRev+ytdMisc)}</td></tr>
      <tr><td>Avg Occupancy</td><td class="r">${fmtPct(ytdOcc)}</td></tr>
      <tr><td>Avg ADR</td><td class="r">${fmt$(ytdADR)}</td></tr>
      ${lyYtd>0?`<tr><td>LY Room Revenue</td><td class="r" style="color:var(--fog)">${fmt$(lyYtd)} ${deltaChip(ytdRev,lyYtd)}</td></tr>`:''}
    </table>`;
  } else {
    document.getElementById('ytd-body').innerHTML = empty('No YTD data','');
    document.getElementById('ytd-badge').textContent = '0 days';
  }

  // AR Snap
  const propAR = S.ar.filter(r=>r.property===prop);
  if(propAR.length){
    const ld = propAR[0].date;
    const arRows = propAR.filter(r=>r.date===ld);
    const tot = arRows.reduce((s,r)=>s+(r.total||0),0);
    const o90 = arRows.reduce((s,r)=>s+(r.over_90||0)+(r.over_120||0)+(r.over_150||0),0);
    document.getElementById('ar-snap-badge').textContent = fmt$(tot);
    document.getElementById('ar-snap-badge').className = `section-badge ${o90>50000?'badge-alert':o90>20000?'badge-warn':'badge-ok'}`;
    document.getElementById('ar-snap-body').innerHTML = `<div class="aging-grid">${arRows.map(r=>agingCellHtml(r)).join('')}</div><div style="padding:.6rem 1.4rem;font-family:var(--mono);font-size:.58rem;color:var(--fog)">As of ${fmtDate(ld)}</div>`;
  } else {
    document.getElementById('ar-snap-body').innerHTML = empty('No AR data','Upload Direct Bill Aging report');
    document.getElementById('ar-snap-badge').textContent = '—';
  }

  // Overrides
  if(dayOvr.length){
    const net = dayOvr.reduce((s,r)=>s+(r.override_amount||0),0);
    document.getElementById('ovr-badge').textContent=`${dayOvr.length} — net ${fmt$(net)}`;
    document.getElementById('ovr-badge').className=`section-badge ${net<-50?'badge-alert':'badge-warn'}`;
    document.getElementById('ovr-body').innerHTML=`<div class="tbl-wrap">${overrideTableHtml(dayOvr)}</div>`;
  } else {
    document.getElementById('ovr-badge').textContent='None';
    document.getElementById('ovr-badge').className='section-badge badge-ok';
    document.getElementById('ovr-body').innerHTML=empty('No overrides for '+fmtDate(d),'');

  // Adjustments
  if(dayAdj.length){
    const tot = dayAdj.reduce((s,r)=>s+Math.abs(r.adjusted_amount||0),0);
    document.getElementById('adj-badge').textContent=`${dayAdj.length} events`;
    document.getElementById('adj-badge').className=`section-badge ${refunds.length?'badge-alert':'badge-warn'}`;
    document.getElementById('adj-body').innerHTML=`<div class="tbl-wrap">${adjTableHtml(dayAdj)}</div>`;
  } else {
    document.getElementById('adj-badge').textContent='None';
    document.getElementById('adj-badge').className='section-badge badge-ok';
    document.getElementById('adj-body').innerHTML=empty('No adjustments for '+fmtDate(d),'');
  }
}

function buildARTrendTable(prop){
  const propAR = S.ar.filter(r=>!prop||r.property===prop);
  const dates = [...new Set(propAR.map(r=>r.date))].sort().slice(-7);
  if(dates.length<2) return empty('Not enough data for trend','Upload more Daily AR reports');
  return `<table class="data-table">
    <thead><tr><th>Date</th><th class="r">CLC</th><th class="r">IHG Rewards</th><th class="r">Total</th><th class="r">Change</th></tr></thead>
    <tbody>${dates.map((dt,i)=>{
      const rows = propAR.filter(r=>r.date===dt);
      const tot = rows.reduce((s,r)=>s+(r.total||0),0);
      let chg='';
      if(i>0){
        const prev = propAR.filter(r=>r.date===dates[i-1]).reduce((s,r)=>s+(r.total||0),0);
        const diff = tot-prev;
        chg=`<span style="color:${diff>0?'var(--red)':'var(--green)'};font-family:var(--mono);font-size:.68rem">${diff>0?'+':''}${fmt$(diff)}</span>`;
      }
      const clc = rows.find(r=>r.company==='CLC');
      const ihg = rows.find(r=>r.company==='IHG_REWARDS');
      return `<tr><td class="mono">${fmtDate(dt)}</td><td class="r">${fmt$(clc?.total)}</td><td class="r">${fmt$(ihg?.total)}</td><td class="r" style="font-weight:500">${fmt$(tot)}</td><td class="r">${chg}</td></tr>`;
    }).join('')}</tbody>
  </table>`;
}

function wireUpload(){
  const zone = document.getElementById('u-zone');
  const input = document.getElementById('u-input');
  const results = document.getElementById('u-results');
  const commit = document.getElementById('u-commit');

  zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('dragover')});
  zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('dragover');handleFiles([...e.dataTransfer.files])});
  input.addEventListener('change',()=>handleFiles([...input.files]));

  async function handleFiles(files){
    S.pending=[];results.innerHTML='';
    for(const file of files){
      const ext=file.name.split('.').pop().toLowerCase();
      let type='UNKNOWN', data=null;
      try {
        if(ext==='pdf'){
          const text = await readText(file);
          const r = detectReport(text);
          type=r.type; data=r.data;
        } else if(['xlsx','xls'].includes(ext)){
          type='RATE_OVERRIDE'; data={filename:file.name,file};
        }
      } catch(e){ type='ERROR'; }

      const saveable=['HOTEL_STATISTICS','AR_AGING','ADJUSTMENTS','INHOUSE_BALANCES'].includes(type);
      if(saveable && data) S.pending.push({type,data,name:file.name});

      const labels={'HOTEL_STATISTICS':'Hotel Statistics','AR_AGING':'Direct Bill Aging','RATE_OVERRIDE':'Rate Override','ADJUSTMENTS':'Adjustments & Refunds','INHOUSE_BALANCES':'In-House Balances','TAX_REPORT':'Tax Report','USER_ACTIVITY':'User Activity','CLERK_ACTIVITY':'Clerk Activity','CLOSED_FOLIO':'Closed Folio','UNKNOWN':'Unrecognized','ERROR':'Read Error'};
      results.innerHTML += `<div class="upload-item">
        <div style="font-size:1rem">${ext==='xlsx'?'📊':'📄'}</div>
        <div class="upload-item-name">${file.name}</div>
        <span class="upload-item-type ${type==='UNKNOWN'?'type-unk':type==='ERROR'?'type-err':'type-ok'}">${labels[type]||type}</span>
        <div class="upload-item-note">${saveable?'→ will save':type==='UNKNOWN'?'not saved':'display only'}</div>
      </div>`;
    }
    commit.disabled = S.pending.length===0;
    commit.textContent = S.pending.length>0 ? `Save ${S.pending.length} report${S.pending.length>1?'s':''} to Database` : 'Save to Database';
  }

  commit.addEventListener('click', async()=>{
    commit.disabled=true; commit.textContent='Saving...';
    let saved=0, errors=0;
    for(const f of S.pending){
      try {
        if(f.type==='HOTEL_STATISTICS' && f.data?.date){
          const d=f.data;
          await sbUpsert('daily_revenue',{property:S.mode,date:d.date,occ_pct:d.occ_pct,adr:d.adr,revpar:d.revpar,rooms_sold:d.rooms_sold,rooms_available:d.rooms_available,room_revenue:d.room_revenue,misc_revenue:d.misc_revenue,total_revenue:d.total_revenue,ly_occ_pct:d.ly_occ_pct,ly_adr:d.ly_adr,ly_room_revenue:d.ly_room_revenue},'property,date');
          saved++;
        }
        if(f.type==='AR_AGING' && Array.isArray(f.data)){
          for(const row of f.data){
            if(row.date&&row.company){ await sbUpsert('ar_aging',{...row,property:S.mode},'property,date,company'); saved++; }
          }
        }
        if(f.type==='ADJUSTMENTS' && f.data?.date){
          await sbPost('adjustments',{property:S.mode,date:f.data.date,transaction_type:'ADJUSTMENT',reason_code:'UPLOADED',remarks:'Uploaded: '+f.name});
          saved++;
        }
      } catch(e){ console.error(f.name,e); errors++; }
    }
    await loadAllData();
    toast(errors===0?`Saved ${saved} record${saved>1?'s':''}`:`Saved ${saved}, ${errors} failed`,(errors===0?'success':'error'));
    commit.disabled=false; commit.textContent='Save to Database'; S.pending=[];
  });
}

// ═══════════════════════════════════════════
// FILE PARSING
// ═══════════════════════════════════════════
function readText(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsText(file); }); }

function detectReport(text){
  const t=text.toUpperCase();
  if(t.includes('HOTEL STATISTICS')&&(t.includes('ACTUAL TODAY')||t.includes('M-T-D'))) return {type:'HOTEL_STATISTICS',data:parseHotelStats(text)};
  if(t.includes('DIRECT BILL AGING')&&t.includes('OVER 150')) return {type:'AR_AGING',data:parseARPDF(text)};
  if(t.includes('ADJUSTMENTS AND REFUNDS')||( t.includes('ADJUSTMENT')&&t.includes('REASON CODE'))) return {type:'ADJUSTMENTS',data:parseAdjPDF(text)};
  if(t.includes('IN HOUSE GUEST BALANCES')||t.includes('IN-HOUSE GUEST BALANCES')) return {type:'INHOUSE_BALANCES',data:parseIHPDF(text)};
  if(t.includes('TAX REPORT')&&t.includes('PAYABLE TAX')) return {type:'TAX_REPORT',data:null};
  if(t.includes('USER ACTIVITY REPORT')) return {type:'USER_ACTIVITY',data:null};
  if(t.includes('CLERK ACTIVITY')) return {type:'CLERK_ACTIVITY',data:null};
  if(t.includes('CLOSED FOLIO BALANCES')) return {type:'CLOSED_FOLIO',data:null};
  if(t.includes('RATE OVERRIDE')) return {type:'RATE_OVERRIDE',data:null};
  return {type:'UNKNOWN',data:null};
}

function extractDate(text){
  const m1=text.match(/Date:\s*(\w+\s+\d+,?\s*\d{4})/i);
  if(m1){const d=new Date(m1[1]);if(!isNaN(d))return d.toISOString().slice(0,10);}
  const m2=text.match(/Date Range:\s*(\w+\s+\d+,?\s*\d{4})/i);
  if(m2){const d=new Date(m2[1]);if(!isNaN(d))return d.toISOString().slice(0,10);}
  const m3=text.match(/(\d{2}-\d{2}-\d{2})/);
  if(m3){const p=m3[1].split('-');return `20${p[2]}-${p[0]}-${p[1]}`;}
  return null;
}

function pn(s){if(!s)return null;const n=parseFloat(String(s).replace(/[$,%]/g,'').replace(/,/g,''));return isNaN(n)?null:n;}

function parseHotelStats(text){
  const date=extractDate(text);
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  function findVal(kw){
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(kw.toUpperCase())){
        const combined=lines.slice(i,i+3).join(' ');
        const nums=combined.match(/[\d,]+\.?\d*/g);
        if(nums&&nums.length>0)return pn(nums[0]);
      }
    }
    return null;
  }
  let room_revenue=null;
  for(let i=0;i<lines.length;i++){
    if(lines[i]==='Totals'||lines[i].toLowerCase()==='totals'){
      const combined=lines.slice(i,i+4).join(' ');
      const nums=combined.match(/\$?[\d,]+\.?\d*/g);
      if(nums&&nums.length>=1){room_revenue=pn(nums[0]);break;}
    }
  }
  return {date,occ_pct:findVal('Occupancy Including Out'),adr:findVal('ADR Including'),revpar:findVal('RevPAR'),rooms_sold:findVal('Room Sold'),rooms_available:findVal('Rooms Available'),room_revenue,misc_revenue:null,total_revenue:null,ly_occ_pct:null,ly_adr:null,ly_room_revenue:null};
}

function parseARPDF(text){
  const date=extractDate(text);
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const result=[];
  ['CLC','IHG REWARD'].forEach(co=>{
    for(let i=0;i<lines.length;i++){
      if(lines[i].toUpperCase().includes(co)){
        const combined=lines.slice(i,i+5).join(' ');
        const nums=combined.match(/[-$\d,]+\.?\d*/g)?.map(pn).filter(n=>n!==null)||[];
        if(nums.length>=7){
          result.push({date,company:co==='CLC'?'CLC':'IHG_REWARDS',current_bal:nums[0],over_30:nums[2],over_60:nums[3],over_90:nums[4],over_120:nums[5],over_150:nums[6],total:nums[7]||null});
          break;
        }
      }
    }
  });
  return result;
}

function parseAdjPDF(text){ return {date:extractDate(text),raw:text}; }
function parseIHPDF(text){ return {date:extractDate(text),raw:text}; }
