async function renderTackCard(prop, date) {
  const el = document.getElementById('tack-body');
  const badge = document.getElementById('tack-badge');
  if (!el) return;

  // The HK app records under the NEXT day's date (e.g. work done Jun 9 = date Jun 10).
  // So to get yesterday's housekeeping work we need today's date in the HK app.
  // We also try the exact date in case the GM entered it under the actual work date.
  const d = new Date(date + 'T00:00:00');
  const nextDay = localISODate(new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1));
  const h = { apikey: TACK_KEY, Authorization: 'Bearer ' + TACK_KEY };

  try {
    // Fetch daily_totals — try nextDay first (HK app convention), then date itself
    const [totNext, totSame, hkNext, hkSame] = await Promise.all([
      fetch(`${TACK_SB}/rest/v1/daily_totals?hotel_code=eq.${prop}&date=eq.${nextDay}&limit=1`, { headers: h }).then(r => r.json()),
      fetch(`${TACK_SB}/rest/v1/daily_totals?hotel_code=eq.${prop}&date=eq.${date}&limit=1`,    { headers: h }).then(r => r.json()),
      fetch(`${TACK_SB}/rest/v1/housekeeping?hotel_code=eq.${prop}&date=eq.${nextDay}&order=name`, { headers: h }).then(r => r.json()),
      fetch(`${TACK_SB}/rest/v1/housekeeping?hotel_code=eq.${prop}&date=eq.${date}&order=name`,    { headers: h }).then(r => r.json()),
    ]);

    const tot   = (Array.isArray(totNext)  && totNext.length)  ? totNext[0]  : (Array.isArray(totSame) && totSame.length) ? totSame[0] : null;
    const hkRows= (Array.isArray(hkNext)   && hkNext.length)   ? hkNext      : (Array.isArray(hkSame) && hkSame.length)  ? hkSame     : [];
    const hkDate= tot?.date || (hkRows[0]?.date) || null;

    const noData = !tot && !hkRows.length;
    if (noData) {
      badge.textContent = 'Not entered';
      badge.className = 'section-badge badge-warn';
      el.innerHTML = `
        <div style="padding:.6rem 0 .4rem;font-family:var(--mono);font-size:.72rem;color:var(--amber)">
          No housekeeping data entered for ${fmtDate(date)} in Tack.
        </div>
        <a href="${TACK_URL}" target="_blank" rel="noopener" class="btn-sec" style="display:inline-block;margin-top:.5rem;font-size:.72rem;text-decoration:none">Open Tack App ↗</a>`;
      return;
    }

    // Compute totals from hkRows
    const totalRooms = hkRows.reduce((s, r) => s + (r.k1kn_cosolc||0) + (r.k1kn_so||0) + (r.k2qn_cosolc||0) + (r.k2qn_so||0) + (r.o1kn_cosolc||0) + (r.o1kn_so||0) + (r.queen_1br_cosolc||0) + (r.queen_1br_so||0) + (r.so_full_service||0), 0);
    const totalBad    = hkRows.reduce((s, r) => s + (r.bad_rooms||0), 0);
    const totalDeep   = hkRows.reduce((s, r) => s + (r.deep_cleans||0), 0);
    const reviewed    = hkRows.filter(r => r.gm_reviewed).length;

    badge.textContent = hkDate ? fmtDate(hkDate) : '—';
    badge.className = 'section-badge badge-ok';

    const summaryRow = tot ? `
      <div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:.75rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)">
        ${tot.arrivals   != null ? `<div style="text-align:center"><div style="font-family:var(--serif);font-size:1.4rem;color:var(--ink)">${tot.arrivals}</div><div style="font-family:var(--mono);font-size:.58rem;color:var(--fog);text-transform:uppercase;letter-spacing:.08em">Arrivals</div></div>` : ''}
        ${tot.cosolc     != null ? `<div style="text-align:center"><div style="font-family:var(--serif);font-size:1.4rem;color:var(--ink)">${tot.cosolc}</div><div style="font-family:var(--mono);font-size:.58rem;color:var(--fog);text-transform:uppercase;letter-spacing:.08em">Checkouts</div></div>` : ''}
        ${tot.stayover   != null ? `<div style="text-align:center"><div style="font-family:var(--serif);font-size:1.4rem;color:var(--ink)">${tot.stayover}</div><div style="font-family:var(--mono);font-size:.58rem;color:var(--fog);text-transform:uppercase;letter-spacing:.08em">Stay-Overs</div></div>` : ''}
        ${totalBad > 0 ? `<div style="text-align:center"><div style="font-family:var(--serif);font-size:1.4rem;color:var(--red)">${totalBad}</div><div style="font-family:var(--mono);font-size:.58rem;color:var(--fog);text-transform:uppercase;letter-spacing:.08em">Bad Rooms</div></div>` : ''}
        ${totalDeep > 0 ? `<div style="text-align:center"><div style="font-family:var(--serif);font-size:1.4rem;color:var(--blue)">${totalDeep}</div><div style="font-family:var(--mono);font-size:.58rem;color:var(--fog);text-transform:uppercase;letter-spacing:.08em">Deep Cleans</div></div>` : ''}
      </div>` : '';

    const attendantRows = hkRows.length ? `
      <div style="font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--fog);margin-bottom:.4rem">${hkRows.length} Attendant${hkRows.length > 1 ? 's' : ''} · ${totalRooms} rooms total</div>
      <div class="tbl-wrap"><table class="data-table">
        <thead><tr><th>Name</th><th class="r">Rooms</th><th class="r">Bad</th><th class="r">Deep</th><th>In</th><th>Out</th><th>Rating</th><th>GM ✓</th></tr></thead>
        <tbody>${hkRows.map(r => {
          const rooms = (r.k1kn_cosolc||0)+(r.k1kn_so||0)+(r.k2qn_cosolc||0)+(r.k2qn_so||0)+(r.o1kn_cosolc||0)+(r.o1kn_so||0)+(r.queen_1br_cosolc||0)+(r.queen_1br_so||0)+(r.so_full_service||0);
          const ratingColor = r.rating === 'Satisfactory' ? 'var(--green)' : r.rating ? 'var(--amber)' : 'var(--fog)';
          return `<tr>
            <td style="font-weight:600">${r.name||'—'}</td>
            <td class="r mono">${rooms}</td>
            <td class="r mono" style="${(r.bad_rooms||0)>0?'color:var(--red);font-weight:600':''}">${r.bad_rooms||0}</td>
            <td class="r mono" style="${(r.deep_cleans||0)>0?'color:var(--blue)':''}">${r.deep_cleans||0}</td>
            <td class="mono" style="font-size:.7rem">${r.clock_in||'—'}</td>
            <td class="mono" style="font-size:.7rem">${r.clock_out||'—'}</td>
            <td style="font-size:.75rem;color:${ratingColor}">${r.rating||'—'}</td>
            <td style="text-align:center;font-size:.8rem">${r.gm_reviewed ? '✓' : '·'}</td>
          </tr>${r.notes ? `<tr><td colspan="8" style="font-size:.7rem;color:var(--fog);font-style:italic;padding:.15rem 1rem .4rem">${r.notes}</td></tr>` : ''}`;
        }).join('')}</tbody>
      </table></div>` : '';

    const unreviewedWarn = hkRows.length && reviewed < hkRows.length
      ? `<div style="font-family:var(--mono);font-size:.65rem;color:var(--amber);margin-top:.5rem">⚠ ${hkRows.length - reviewed} of ${hkRows.length} attendants not yet GM-reviewed in Tack</div>`
      : '';

    el.innerHTML = summaryRow + attendantRows + unreviewedWarn + `
      <div style="margin-top:.9rem">
        <a href="${TACK_URL}" target="_blank" rel="noopener" class="btn-sec" style="display:inline-block;font-size:.72rem;text-decoration:none">Open Tack App ↗</a>
      </div>`;

  } catch(e) {
    badge.textContent = 'Error';
    badge.className = 'section-badge badge-alert';
    el.innerHTML = `<div style="font-family:var(--mono);font-size:.72rem;color:var(--red)">Could not load Tack data: ${e.message}</div>
      <a href="${TACK_URL}" target="_blank" rel="noopener" class="btn-sec" style="display:inline-block;margin-top:.5rem;font-size:.72rem;text-decoration:none">Open Tack App ↗</a>`;
  }
}

// ═══════════════════════════════════
// HOUSEKEEPING VIEW
// ═══════════════════════════════════
function buildHK(){
  const prop=vp(), p=PROPS[prop];
  return `
  <div class="page-header">
    <div class="page-title">Housekeeping</div>
    <div class="page-sub" id="hk-page-sub">${p?.name} · ${fmtDate(localISODate())}</div>
  </div>
  <div class="content">
    <div class="section-card" id="hk-highlights" style="margin-bottom:1rem">${loading()}</div>
    <div class="section-card" id="hk-detail" style="display:none"></div>
  </div>`;
}

async function renderHKContent(prop){
  const h = { apikey: TACK_KEY, Authorization: 'Bearer ' + TACK_KEY };
  const today     = localISODate();
  const yesterday = localYesterday();
  const since     = localISODate(new Date(new Date(today+'T00:00:00').getTime() - 7*86400000));
  const el        = document.getElementById('hk-highlights');
  if(!el) return;

  try {
    // Three parallel fetches: 7-day totals, 7-day hk rows, MTD hk rows for pet totals
    const monthStart = today.slice(0,7)+'-01';
    const [totals, hkRows, mtdHK] = await Promise.all([
      fetch(`${TACK_SB}/rest/v1/daily_totals?hotel_code=eq.${prop}&date=gte.${since}&order=date.desc`, {headers:h}).then(r=>r.json()),
      fetch(`${TACK_SB}/rest/v1/housekeeping?hotel_code=eq.${prop}&date=gte.${since}&order=date.desc,name`, {headers:h}).then(r=>r.json()),
      fetch(`${TACK_SB}/rest/v1/housekeeping?hotel_code=eq.${prop}&date=gte.${monthStart}&select=pet,public_area`, {headers:h}).then(r=>r.json()),
    ]);

    const safeHK      = Array.isArray(hkRows)    ? hkRows    : [];
    const safeTotals  = Array.isArray(totals)     ? totals    : [];
    const safeMtdHK   = Array.isArray(mtdHK)      ? mtdHK     : [];
    const mtdPet      = safeMtdHK.reduce((s,r)=>s+(r.pet||0),0);

    // displayDate = most recent date ≤ yesterday that has actual HK rows.
    // HK records use the actual work date; daily_totals uses the NEXT day (arrival date).
    const hkDatesDesc = [...new Set(safeHK.map(r=>r.date))].sort((a,b)=>b.localeCompare(a));
    const displayDate = hkDatesDesc.find(d => d <= yesterday) || yesterday;
    const latestHK    = safeHK.filter(r => r.date === displayDate);
    // daily_totals for work done on displayDate is stored one day ahead
    const totDate     = localISODate(new Date(new Date(displayDate+'T00:00:00').getTime()+86400000));
    const latestTot   = safeTotals.find(r => r.date === totDate)
                     || safeTotals.find(r => r.date === displayDate)
                     || (safeTotals.length ? safeTotals[0] : null);
    const noData      = !latestTot && !latestHK.length;

    // ── Per-attendant helper ─────────────────────────────────────────
    const roomCount = r => (r.k1kn_cosolc||0)+(r.k1kn_so||0)+(r.k2qn_cosolc||0)+(r.k2qn_so||0)
                          +(r.o1kn_cosolc||0)+(r.o1kn_so||0)+(r.queen_1br_cosolc||0)+(r.queen_1br_so||0)
                          +(r.so_full_service||0);
    const coCount   = r => (r.k1kn_cosolc||0)+(r.k2qn_cosolc||0)+(r.o1kn_cosolc||0)+(r.queen_1br_cosolc||0);
    const soCount   = r => (r.k1kn_so||0)+(r.k2qn_so||0)+(r.o1kn_so||0)+(r.queen_1br_so||0)+(r.so_full_service||0);

    // ── Update page-sub with date context ───────────────────────────
    const pageSub = document.getElementById('hk-page-sub');
    if(pageSub){
      const p2 = PROPS[prop];
      if(noData){
        pageSub.textContent = `${p2?.name} · ${fmtDate(localISODate())} · HK needs to input data for information to be displayed`.toUpperCase();
      } else {
        pageSub.textContent = `${p2?.name} · ${fmtDate(localISODate())} · Data current through ${fmtDate(displayDate)}`.toUpperCase();
      }
    }

    // ── Latest-day aggregates ────────────────────────────────────────
    const totalRooms = latestHK.reduce((s,r)=>s+roomCount(r),0);
    const totalBad   = latestHK.reduce((s,r)=>s+(r.bad_rooms||0),0);
    const totalDeep  = latestHK.reduce((s,r)=>s+(r.deep_cleans||0),0);
    const totalPet   = latestHK.reduce((s,r)=>s+(r.pet||0),0);
    const totalPA    = latestHK.reduce((s,r)=>s+(r.public_area||0),0);

    // ── GM Pending Review — count by date (matching Tack's own count) ──
    const safePending  = latestHK.filter(r => !r.gm_reviewed);
    // Tack counts pending as number of dates with any unreviewed attendant, not individual rows
    const pendingDates = [...new Set(safeHK.filter(r=>!r.gm_reviewed).map(r=>r.date))].filter(d=>d<=yesterday).sort((a,b)=>b.localeCompare(a));
    const pendingCount = pendingDates.length;
    const allReviewed  = !noData && pendingCount===0 && latestHK.length>0;

    // ── KPI cards ────────────────────────────────────────────────────
    const highlightKpis = noData ? `
      <div style="font-family:var(--mono);font-size:.78rem;color:var(--amber)">
        No housekeeping data entered in Tack for ${fmtDate(displayDate)}.
      </div>` : `
      <div class="kpi-grid">
        <div class="kpi-card ${totalBad>0?'red':'green'}">
          <div class="kpi-label">Rooms Cleaned</div>
          <div class="kpi-value">${totalRooms}</div>
          <div class="kpi-meta">${latestTot?.cosolc??'—'} checkouts · ${latestTot?.stayover??'—'} stay-overs</div>
        </div>
        <div class="kpi-card blue">
          <div class="kpi-label">Attendants On</div>
          <div class="kpi-value">${latestHK.length}</div>
          <div class="kpi-meta">${totalRooms>0&&latestHK.length>0?(totalRooms/latestHK.length).toFixed(1)+' rooms / person':''}</div>
        </div>
        <div class="kpi-card ${totalBad>0?'amber':'green'}">
          <div class="kpi-label">Bad Rooms</div>
          <div class="kpi-value" style="color:${totalBad>0?'var(--amber)':'inherit'}">${totalBad}</div>
          <div class="kpi-meta">${totalBad===0?'All clear':'Needs follow-up'}</div>
        </div>
        <div class="kpi-card ${totalDeep>0?'amber':'green'}">
          <div class="kpi-label">Deep Cleans</div>
          <div class="kpi-value">${totalDeep}</div>
          <div class="kpi-meta">${totalPet>0?`${totalPet} pet room${totalPet>1?'s':''}`:totalDeep===0?'None today':''}</div>
        </div>
        ${totalPA>0?`<div class="kpi-card amber">
          <div class="kpi-label">Public Area</div>
          <div class="kpi-value">${totalPA}</div>
          <div class="kpi-meta">Tasks completed</div>
        </div>`:''}
        <div class="kpi-card ${mtdPet>0?'gold':'green'}">
          <div class="kpi-label">Pet Rooms MTD</div>
          <div class="kpi-value">${mtdPet}</div>
          <div class="kpi-meta">${fmtMonth(monthStart)}${totalPet>0?' · '+totalPet+' today':''}</div>
        </div>
        <div class="kpi-card ${allReviewed?'green':pendingCount>0?'amber':'blue'}">
          <div class="kpi-label">GM Pending Review</div>
          <div class="kpi-value" style="color:${allReviewed?'var(--green)':pendingCount>0?'var(--amber)':'inherit'}">${allReviewed?'✓':pendingCount}</div>
          <div class="kpi-meta">${allReviewed?'All reviewed':pendingCount>0?`Across ${pendingDates.length} day${pendingDates.length>1?'s':''}`:''}</div>
        </div>
      </div>`;

    // ── Attendant breakdown table ────────────────────────────────────
    const attendantHtml = latestHK.length ? `
      <div style="font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--fog);margin:.5rem 0 .6rem">
        Attendant Breakdown — ${fmtDate(displayDate)}
      </div>
      <div class="tbl-wrap"><table class="data-table">
        <thead><tr><th>Name</th><th class="r">Rooms</th><th class="r">C/O</th><th class="r">S/O</th><th class="r">Bad</th><th class="r">Deep</th><th class="r">Pet</th><th class="r">Pub Area</th><th>In</th><th>Out</th><th>Rating</th><th style="text-align:center">GM ✓</th></tr></thead>
        <tbody>${latestHK.map(r=>{
          const rc = r.rating==='Satisfactory'?'var(--green)':r.rating?'var(--amber)':'var(--fog)';
          return `<tr style="${!r.gm_reviewed?'background:rgba(245,158,11,.04)':''}">
            <td style="font-weight:600;font-size:.82rem">${r.name||'—'}</td>
            <td class="r mono" style="font-weight:600">${roomCount(r)}</td>
            <td class="r mono" style="color:var(--fog)">${coCount(r)}</td>
            <td class="r mono" style="color:var(--fog)">${soCount(r)}</td>
            <td class="r mono" style="${(r.bad_rooms||0)>0?'color:var(--red);font-weight:700':''}">${r.bad_rooms||0}</td>
            <td class="r mono" style="${(r.deep_cleans||0)>0?'color:var(--blue)':''}">${r.deep_cleans||0}</td>
            <td class="r mono" style="${(r.pet||0)>0?'color:var(--amber)':''}">${r.pet||0}</td>
            <td class="r mono" style="${(r.public_area||0)>0?'color:var(--blue)':''}">${r.public_area||0}</td>
            <td style="font-size:.72rem">${r.clock_in||'—'}</td>
            <td style="font-size:.72rem">${r.clock_out||'—'}</td>
            <td style="font-size:.75rem;color:${rc}">${r.rating||'—'}</td>
            <td style="text-align:center;font-size:.9rem">${r.gm_reviewed?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--amber)">!</span>'}</td>
          </tr>${r.notes?`<tr><td colspan="12" style="font-size:.7rem;color:var(--fog);font-style:italic;padding:.1rem 1rem .4rem">📝 ${r.notes}</td></tr>`:''}`;
        }).join('')}</tbody>
      </table></div>` : '';

    // ── All pending review section ───────────────────────────────────
    const pendingHtml = pendingCount>0 ? `
      <div style="font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--amber);margin:1.25rem 0 .6rem">
        ⚠ Pending GM Review — ${fmtDate(displayDate)} (${pendingCount})
      </div>
      <div class="tbl-wrap"><table class="data-table">
        <thead><tr><th>Date</th><th>Name</th><th class="r">Rooms</th><th class="r">Bad</th><th>Rating</th></tr></thead>
        <tbody>${safePending.map(r=>`<tr>
          <td style="font-size:.78rem">${fmtDate(r.date)}</td>
          <td style="font-weight:600;font-size:.82rem">${r.name||'—'}</td>
          <td class="r mono">${roomCount(r)}</td>
          <td class="r mono" style="${(r.bad_rooms||0)>0?'color:var(--red);font-weight:700':''}">${r.bad_rooms||0}</td>
          <td style="font-size:.75rem;color:${r.rating==='Satisfactory'?'var(--green)':r.rating?'var(--amber)':'var(--fog)'}">${r.rating||'—'}</td>
        </tr>`).join('')}</tbody>
      </table></div>` : '';

    // ── 7-day history ────────────────────────────────────────────────
    // HK rows use actual work date; daily_totals stores one day ahead (arrival date).
    // Build history from HK work dates and look up totals via nextDay.
    const histDates = [...new Set(safeHK.map(r=>r.date))].sort((a,b)=>b.localeCompare(a));
    const histHtml = histDates.length ? `
      <div style="font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--fog);margin:1.25rem 0 .6rem">Last 7 Days</div>
      <div class="tbl-wrap"><table class="data-table">
        <thead><tr>
          <th>Date</th>
          <th class="r">C/O</th>
          <th class="r">S/O</th>
          <th class="r">Staff</th>
          <th class="r">Rooms</th>
          <th class="r">Bad</th>
          <th class="r">Deep</th>
          <th class="r" style="color:var(--amber)">Pet</th>
          <th class="r">Pub Area</th>
        </tr></thead>
        <tbody>${histDates.map(dt=>{
          const nextDay = localISODate(new Date(new Date(dt+'T00:00:00').getTime()+86400000));
          const tot  = safeTotals.find(r=>r.date===nextDay) || safeTotals.find(r=>r.date===dt) || {};
          const day  = safeHK.filter(r=>r.date===dt);
          const dayRooms = day.reduce((s,r)=>s+roomCount(r),0);
          const dayBad   = day.reduce((s,r)=>s+(r.bad_rooms||0),0);
          const dayDeep  = day.reduce((s,r)=>s+(r.deep_cleans||0),0);
          const dayPet   = day.reduce((s,r)=>s+(r.pet||0),0);
          const dayPA    = day.reduce((s,r)=>s+(r.public_area||0),0);
          const isLatest = dt===displayDate;
          return `<tr style="${isLatest?'background:var(--cream);font-weight:600':''}">
            <td style="font-size:.8rem;white-space:nowrap">${fmtDate(dt)}${isLatest?` <span class="pill pill-blue" style="font-size:.5rem;vertical-align:middle">latest</span>`:''}</td>
            <td class="r mono">${tot.cosolc??'—'}</td>
            <td class="r mono">${tot.stayover??'—'}</td>
            <td class="r mono">${day.length||'—'}</td>
            <td class="r mono" style="font-weight:${isLatest?700:400}">${dayRooms||'—'}</td>
            <td class="r mono" style="${dayBad>0?'color:var(--amber);font-weight:700':''}">${dayBad||'—'}</td>
            <td class="r mono" style="${dayDeep>0?'color:var(--blue)':''}">${dayDeep||'—'}</td>
            <td class="r mono" style="${dayPet>0?'color:var(--amber);font-weight:600':''}">${dayPet||'—'}</td>
            <td class="r mono" style="${dayPA>0?'color:var(--fog)':''}">${dayPA||'—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>` : '';

    el.innerHTML = `
      <div class="section-head">
        <div class="section-title">Housekeeping Summary</div>
        <div style="display:flex;align-items:center;gap:.75rem">
          <span class="section-badge ${noData?'badge-warn':allReviewed?'badge-ok':pendingCount>0?'badge-warn':'badge-info'}">
            ${noData?'Not Entered':allReviewed?'All Reviewed':pendingCount+' Pending'}
          </span>
          <a href="${TACK_URL}" target="_blank" rel="noopener"
             style="font-family:var(--serif);font-size:.95rem;font-weight:700;padding:.3rem .9rem;border-radius:6px;border:2px solid var(--gold);color:var(--gold);text-decoration:none;background:transparent;letter-spacing:.02em">
            Open Tack ↗
          </a>
        </div>
      </div>
      <div style="padding:1rem 1.4rem 1.4rem">
        ${highlightKpis}
        ${histHtml}
        ${attendantHtml}
        ${pendingHtml}
      </div>`;

  } catch(e) {
    el.innerHTML=`<div style="font-family:var(--mono);font-size:.75rem;color:var(--red);padding:.5rem 0">Could not load Tack data: ${e.message}</div>
      <a href="${TACK_URL}" target="_blank" rel="noopener" class="btn-sec" style="display:inline-block;margin-top:.5rem;font-size:.72rem;text-decoration:none">Open Tack App ↗</a>`;
  }
}

// ═══════════════════════════════════
// PERFORMANCE VIEW
// ═══════════════════════════════════
function buildPerformance(){
  return `<div class="page-header"><div class="page-title">Performance</div><div class="page-sub">${PROPS[S.mode]?.name} · Trends · History</div></div>
  <div class="content">
    <div class="section-card"><div class="section-head"><div class="section-title">Daily Revenue — Trailing 30 Days</div></div><div style="padding:1.4rem;height:240px;position:relative"><canvas id="chart-daily-30"></canvas></div></div>
    <div class="section-card"><div class="section-head"><div class="section-title">Monthly History</div><div class="section-badge badge-info">Jan 2023 – Present</div></div>
      <div class="tab-bar"><button class="tab-btn active" data-tab="p-table">Table</button><button class="tab-btn" data-tab="p-chart">Chart</button></div>
      <div class="tab-content active" id="tab-p-table">${buildMonthlyTableHtml()}</div>
      <div class="tab-content" id="tab-p-chart"><div style="height:300px;position:relative"><canvas id="chart-monthly"></canvas></div></div>
    </div>
  </div>`;
}
function renderPerfCharts(){
  const prop=S.mode;
  const rows=Object.values(S.daily).filter(r=>r.property===prop).sort((a,b)=>a.date.localeCompare(b.date)).slice(-30);

// Build per-company summary from ar_aging for a given property + date, filtering by category
function arAgingSummary(prop, date, category){
  return S.ar.filter(r=>r.property===prop&&r.date===date&&(!category||r.category===category))
    .filter(r=>r.total!==0)
    .map(r=>({
      company: r.company, category: r.category,
      current: r.current_bal||0,
      b7: r.over_7||0, b14: r.over_14||0,
      b30: r.over_30||0, b60: r.over_60||0,
      b90: r.over_90||0, b120: r.over_120||0, b150: r.over_150||0,
      total: r.total||0
    }))
    .sort((a,b)=>b.total-a.total);
}

// AR total = AR + Invoices only. Settlements are excluded — they are unapplied
// payments that don't yet change the outstanding balance until posted in the PMS.
// They are flagged separately as "Payments Not Applied."
function arNetTotal(rows){
  return rows.filter(r=>r.category!=='Settlements').reduce((s,r)=>s+(r.total||0),0);
}
// Returns unapplied settlement total for a row set (for callout display).
function arSettlementsTotal(rows){
  return rows.filter(r=>r.category==='Settlements').reduce((s,r)=>s+(r.total||0),0);
}

// Also keep ar_activity summary for transaction drill-down
function arActivitySummary(prop, snapshotDate){
  const rows=S.arActivity.filter(r=>r.property===prop&&r.snapshot_date===snapshotDate);
  const byCompany={};
  rows.forEach(r=>{
    const co=r.company_name||'Unknown';
    if(!byCompany[co]) byCompany[co]={company:co,current:0,b30:0,b60:0,b90:0,b120:0,b150:0};
    byCompany[co].current+=(r.current_bal||0); byCompany[co].b30+=(r.over_30||0);
    byCompany[co].b60+=(r.over_60||0); byCompany[co].b90+=(r.over_90||0);
    byCompany[co].b120+=(r.over_120||0); byCompany[co].b150+=(r.over_150||0);
  });
  return Object.values(byCompany).map(c=>({...c,total:c.current+c.b30+c.b60+c.b90+c.b120+c.b150})).filter(c=>c.total!==0).sort((a,b)=>b.total-a.total);
}

function arAgingHtml(companies){
  if(!companies.length) return empty('No AR data','Upload Direct Bill Aging report');
  const settleTotal=arSettlementsTotal(companies);
  const arOnly=companies.filter(c=>c.category!=='Settlements');
  return `<div class="aging-grid">${arOnly.map(c=>{
    const tot=c.total, over90=c.b90+c.b120+c.b150;
    return `<div class="aging-cell">
      <div class="aging-co">${c.company}${c.category&&c.category!=='Accounts Receivables'?` <span style="font-size:.5rem;color:var(--fog)">(${c.category})</span>`:''}</div>
      <div class="aging-tot">${fmt$(tot)}</div>
      ${[['Current',c.current,'fill-cur'],['31–60',c.b30,'fill-30'],['61–90',c.b60,'fill-60'],['91–120',c.b90,'fill-90'],['121–150',c.b120,'fill-120'],['Over 150',c.b150,'fill-150']].map(([lbl,val,cls])=>
        `<div class="aging-row"><div class="aging-lbl">${lbl}</div><div class="aging-track"><div class="aging-fill ${cls}" style="width:${tot>0?Math.min(100,Math.round(Math.abs(val)/tot*100)):0}%"></div></div><div class="aging-val">${fmt$(val)}</div></div>`
      ).join('')}
      ${over90>0?`<div style="margin-top:.5rem;font-family:var(--mono);font-size:.57rem;color:var(--red)">90+ days: ${fmt$(over90)}</div>`:''}
    </div>`;
  }).join('')}</div>
  ${settleTotal>0?`<div style="padding:.6rem 1.4rem;background:var(--amber-lt);border-top:2px solid var(--amber);display:flex;align-items:center;gap:.6rem"><span style="font-size:.88rem">⚠</span><span style="font-family:var(--mono);font-size:.68rem;color:var(--amber)"><strong>${fmt$(settleTotal)}</strong> Payments Not Applied — settlements recorded in PMS but not yet posted to accounts</span></div>`:''}`;
}

    </div>`:''}

function buildARTrendTable(prop){
  // ar_aging has 7 daily snapshots — all categories
  const propAR=S.ar.filter(r=>(!prop||r.property===prop));
  const dates=[...new Set(propAR.map(r=>r.date))].sort().slice(-7);
  if(!dates.length) return empty('Not enough data','Upload Direct Bill Aging reports');
  return `<table class="data-table"><thead><tr><th>Date</th><th class="r">CLC AR</th><th class="r">IHG Rewards</th><th class="r">KFLEX</th><th class="r">AR Total</th><th class="r">Pmts Not Applied</th><th class="r">90+ Days</th><th class="r">Change</th></tr></thead><tbody>${dates.map((dt,i)=>{
    const rows=propAR.filter(r=>r.date===dt);
    const tot=arNetTotal(rows); // AR + Invoices only (Settlements excluded)
    const arRows=rows.filter(r=>r.category==='Accounts Receivables');
    const over90=arRows.reduce((s,r)=>s+(r.over_90||0)+(r.over_120||0)+(r.over_150||0),0);
    const clc=rows.find(r=>r.company==='CLC'&&r.category==='Accounts Receivables');
    const ihg=rows.find(r=>r.company==='IHG REWARD NIGHT REIMBURSEMENTS');
    const settle=rows.find(r=>r.category==='Settlements');
    const kflex=rows.find(r=>r.category==='Invoices');
    let chg='';
    if(i>0){const prevTot=arNetTotal(propAR.filter(r=>r.date===dates[i-1])); const diff=tot-prevTot; chg=`<span style="color:${diff>0?'var(--red)':'var(--green)'};">${diff>0?'+':''}${fmt$(diff)}</span>`;}
    return `<tr><td class="mono">${fmtDate(dt)}</td><td class="r mono">${fmt$(clc?.total)}</td><td class="r mono">${fmt$(ihg?.total)}</td><td class="r mono" style="color:${kflex&&kflex.total<0?'var(--green)':'var(--ink3)'}">${kflex?fmt$(kflex.total):'—'}</td><td class="r mono" style="font-weight:600">${fmt$(tot)}</td><td class="r mono" style="${settle?'color:var(--amber);font-weight:500':'color:var(--fog)'}">${settle?fmt$(settle.total):'—'}</td><td class="r mono" style="color:var(--red)">${fmt$(over90)}</td><td class="r mono">${chg}</td></tr>`;
  }).join('')}</tbody></table>`;
}

function txKey(prop,cat,date,room,guest){return[prop,cat,date,room||'',guest||''].join('|').toLowerCase();}
function getNotesForTx(prop,cat,date,room,guest){
  const k=txKey(prop,cat,date,room,guest);
  return (S.txNotes||[]).filter(n=>txKey(n.property,n.tx_category,n.tx_date,n.room_number,n.guest_name)===k);
}
function notesBtnHtml(prop,cat,date,room,guest){
  const count=getNotesForTx(prop,cat,date,room,guest).length;
  return `<button class="notes-btn" data-prop="${prop}" data-cat="${cat}" data-date="${date}" data-room="${room||''}" data-guest="${(guest||'').replace(/"/g,'&quot;')}" title="Notes">${count?`<span class="notes-count">${count}</span>`:''}+ Note</button>`;
}
function openNotesModal(prop,cat,date,room,guest){
  const notes=getNotesForTx(prop,cat,date,room,guest);
  const title=`${cat.charAt(0).toUpperCase()+cat.slice(1)} Note — Rm ${room||'?'} · ${guest||'Guest'} · ${fmtDate(date)}`;
  const notesHtml=notes.length
    ?notes.map(n=>`<div style="padding:.65rem 1.4rem;border-bottom:1px solid var(--border)"><div style="font-family:var(--mono);font-size:.62rem;color:var(--fog);margin-bottom:.3rem">${new Date(n.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} · ${n.created_by}</div><div style="font-size:.88rem;color:var(--ink)">${n.note_text.replace(/</g,'&lt;')}</div></div>`).join('')
    :`<div style="padding:1rem 1.4rem;font-family:var(--mono);font-size:.72rem;color:var(--fog)">No notes yet.</div>`;
  const savedName=localStorage.getItem('cbsNotesName')||'';
  document.getElementById('daily-modal-title').textContent=title;
  document.getElementById('daily-modal-body').innerHTML=`
    <div id="notes-list">${notesHtml}</div>
    <div style="padding:1rem 1.4rem;border-top:2px solid var(--border)">
      <textarea id="notes-input" placeholder="Add a note…" style="width:100%;box-sizing:border-box;min-height:80px;padding:.55rem .7rem;border:1px solid var(--border);border-radius:6px;font-size:.88rem;font-family:inherit;resize:vertical;background:var(--white);color:var(--ink)"></textarea>
      <div style="display:flex;align-items:center;gap:.65rem;margin-top:.65rem">
        <input id="notes-name" placeholder="Your name / initials" value="${savedName}" style="flex:1;padding:.45rem .7rem;border:1px solid var(--border);border-radius:6px;font-family:var(--mono);font-size:.72rem;background:var(--white);color:var(--ink)">
        <button id="notes-add-btn" style="padding:.5rem 1.2rem;background:var(--ink);color:var(--gold);border:none;border-radius:7px;font-family:var(--mono);font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer">Add Note</button>
      </div>
      <div id="notes-status" style="font-family:var(--mono);font-size:.65rem;color:var(--fog);margin-top:.4rem;min-height:1rem"></div>
    </div>`;
  document.getElementById('daily-modal').style.display='flex';
  document.getElementById('notes-add-btn').onclick=async()=>{
    const text=document.getElementById('notes-input').value.trim();
    const name=document.getElementById('notes-name').value.trim()||'operator';
    if(!text){document.getElementById('notes-status').textContent='Note cannot be empty.';return;}
    document.getElementById('notes-add-btn').disabled=true;
    document.getElementById('notes-status').textContent='Saving…';
    try {
      await sbPost('transaction_notes',{property:prop,tx_category:cat,tx_date:date,room_number:room||null,guest_name:guest||null,note_text:text,created_by:name});
      localStorage.setItem('cbsNotesName',name);
      const newNote={property:prop,tx_category:cat,tx_date:date,room_number:room||null,guest_name:guest||null,note_text:text,created_by:name,created_at:new Date().toISOString()};
      S.txNotes=[...(S.txNotes||[]),newNote];
      document.getElementById('notes-status').textContent='Saved.';
      document.getElementById('notes-input').value='';
      const updated=getNotesForTx(prop,cat,date,room,guest);
      document.getElementById('notes-list').innerHTML=updated.map(n=>`<div style="padding:.65rem 1.4rem;border-bottom:1px solid var(--border)"><div style="font-family:var(--mono);font-size:.62rem;color:var(--fog);margin-bottom:.3rem">${new Date(n.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} · ${n.created_by}</div><div style="font-size:.88rem;color:var(--ink)">${n.note_text.replace(/</g,'&lt;')}</div></div>`).join('');

      if(typeof renderAcctDaily==='function') renderAcctDaily();
    } catch(e){document.getElementById('notes-status').textContent='Error: '+e.message;}
    document.getElementById('notes-add-btn').disabled=false;
  };
}

function buildAccountability(){
  const prop=vp(), curMonth=localISODate().slice(0,7);

  // ── Rate Overrides ─────────────────
  const propOvr=S.overrides.filter(r=>r.property===prop);
  const ovrMTD=propOvr.filter(r=>r.stay_date?.startsWith(curMonth));
  const ovrImpact=ovrMTD.reduce((s,r)=>s+(r.override_amount||0),0);
  const byOvrStaff={};
  propOvr.forEach(r=>{ const u=r.username||'Unknown'; if(!byOvrStaff[u]) byOvrStaff[u]={count:0,net:0}; byOvrStaff[u].count++; byOvrStaff[u].net+=(r.override_amount||0); });
  const ovrStaffRows=Object.entries(byOvrStaff).sort((a,b)=>a[1].net-b[1].net);

  // ── Adjustments & Refunds ──────────
  const propAdj=S.adjActivity.filter(r=>r.property===prop);
  const adjMTD=propAdj.filter(r=>r.date?.startsWith(curMonth));
  const refundsMTD=adjMTD.filter(r=>r.section==='Refunds'||r.section==='Manager Refund');
  const adjMTDamt=adjMTD.filter(r=>r.section==='Adjustments'||r.section==='Manager Charge Adjustments').reduce((s,r)=>s+(r.adjusted_amount||0),0);

  // ── User Activity — Reservation Actions (exclude automated ROOM_NUMBER_CHANGE) ─
  const EXCLUDED_ACTIONS=['ROOM_NUMBER_CHANGE'];
  const propUser=S.userActivity.filter(r=>r.property===prop);
  const userMTDAll=propUser.filter(r=>r.date?.startsWith(curMonth));
  const userMTD=userMTDAll.filter(r=>!EXCLUDED_ACTIONS.includes(r.action));
  const byUserStaff={};
  userMTD.forEach(r=>{ const u=r.username||'Unknown'; if(!byUserStaff[u]) byUserStaff[u]={}; const a=r.action||'OTHER'; byUserStaff[u][a]=(byUserStaff[u][a]||0)+1; });
  const allActions=[...new Set(userMTD.map(r=>r.action||'OTHER'))].sort();
  const userStaffRows=Object.entries(byUserStaff).sort((a,b)=>Object.values(b[1]).reduce((s,n)=>s+n,0)-Object.values(a[1]).reduce((s,n)=>s+n,0));

  // date picker defaults to S.currentDate if set, else most recent adj/ovr date
  const allDates=[...new Set([...propOvr.map(r=>r.stay_date),...propAdj.map(r=>r.date)].filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  const acctDate=S.acctDate||(allDates[0]||localYesterday());
  S.acctDate=acctDate;

  return `<div class="page-header"><div class="page-title">Accountability</div><div class="page-sub">${PROPS[prop]?.name} · MTD ${curMonth.slice(0,7)}</div></div>

      <button class="date-today-btn" id="acct-today">Latest</button>
      <div class="spacer"></div>
      <div class="section-badge badge-info" id="acct-day-badge">—</div>
    </div>
    <div id="acct-ovr-section"></div>
    <div id="acct-adj-section"></div>
    <div id="acct-exempt-section"></div>

    <div class="kpi-grid">
      <div class="kpi-card amber"><div class="kpi-label">Override Impact MTD</div><div class="kpi-value">${fmt$(ovrImpact||null)}</div><div class="kpi-meta">${ovrMTD.length} overrides · ${ovrStaffRows.length} staff</div></div>

function wireAccountability(){
  const prop=vp();
  const allDates=[...new Set([...S.overrides.filter(r=>r.property===prop).map(r=>r.stay_date),...S.adjActivity.filter(r=>r.property===prop).map(r=>r.date)].filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  function go(d){ S.acctDate=d; renderAcctDaily(); }
  document.getElementById('acct-prev')?.addEventListener('click',()=>{
    const idx=allDates.indexOf(S.acctDate); if(idx<allDates.length-1) go(allDates[idx+1]);
  });
  document.getElementById('acct-next')?.addEventListener('click',()=>{
    const idx=allDates.indexOf(S.acctDate); if(idx>0) go(allDates[idx-1]);
  });
  document.getElementById('acct-today')?.addEventListener('click',()=>{ if(allDates[0]) go(allDates[0]); });
  renderAcctDaily();
}

// RECONCILIATION TAB
// ═══════════════════════════════════
// Card-brand settlements from HotelKey's "Settlement By Payment Type" report.
// Purpose: match each day's expected card totals against processor/bank deposits.
const RECON_TYPE_ORDER=['VISA','MASTER','AMEX','DISCOVER','CASH','CHECK','BILL TO COMPANY'];
function reconDates(){ return [...new Set((S.settlements||[]).filter(r=>r.property===vp()).map(r=>r.date))].sort().reverse(); }
function reconTypeTotals(rows){
  const m={};
  rows.forEach(r=>{ const t=r.payment_type||'OTHER'; if(!m[t]) m[t]={amt:0,n:0}; m[t].amt+=(r.amount||0); m[t].n++; });
  const known=RECON_TYPE_ORDER.filter(t=>m[t]);
  const extra=Object.keys(m).filter(t=>!RECON_TYPE_ORDER.includes(t)).sort();
  return [...known,...extra].map(t=>({type:t,amt:Math.round(m[t].amt*100)/100,n:m[t].n}));
}
function buildReconciliation(){
  const dates=reconDates();
  if(!dates.length) return `<div class="page-header"><div class="page-title">Reconciliation</div><div class="page-sub">Settlement by Payment Type</div></div><div class="content">${empty('No settlement data yet','Settlement by Payment Type reports upload daily starting Jul 3, 2026')}</div>`;
  if(!S.reconDate||!dates.includes(S.reconDate)) S.reconDate=dates[0];
  return `<div class="page-header"><div class="page-title">Reconciliation</div><div class="page-sub">${(S.props||PROPS)[vp()]?.name||vp()} · Card settlements vs. deposits</div></div>
  <div class="content">
    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap">
      <span style="font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fog)">Business date</span>
      <select id="recon-date" class="date-select" style="font-family:var(--mono);font-size:.8rem;padding:.4rem .7rem;border:1px solid var(--border);border-radius:6px;background:var(--white)">${dates.map(d=>`<option value="${d}"${d===S.reconDate?' selected':''}>${fmtDate(d)}</option>`).join('')}</select>
      <span style="font-family:var(--mono);font-size:.58rem;color:var(--fog)">Card batches typically deposit 1–3 business days later</span>
    </div>
    <div id="recon-cards"></div>
    <div class="section-card"><div class="section-head"><div class="section-title">PMS ↔ Processor Match</div><div class="section-badge" id="recon-match-badge">—</div></div><div id="recon-match" style="padding:.4rem 0"></div></div>
    <div class="section-card"><div class="section-head"><div class="section-title">Daily Totals by Payment Type — Last 14 Days</div><div class="section-badge badge-info">for deposit matching</div></div><div id="recon-matrix" style="padding:.4rem 0"></div></div>
    <div class="section-card"><div class="section-head"><div class="section-title">Settlements — <span id="recon-date-lbl"></span></div><div class="section-badge badge-info" id="recon-count"></div></div><div id="recon-tx"></div></div>
  </div>`;
}
function renderReconContent(){
  const prop=vp(), d=S.reconDate;
  const rows=(S.settlements||[]).filter(r=>r.property===prop&&r.date===d).sort((a,b)=>(a.row_number||0)-(b.row_number||0));
  const totals=reconTypeTotals(rows);
  const grand=Math.round(totals.reduce((s,t)=>s+t.amt,0)*100)/100;
  const refunds=rows.filter(r=>(r.amount||0)<0);
  // Per-type cards
  document.getElementById('recon-cards').innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.75rem;margin-bottom:1.25rem">
    ${totals.map(t=>`<div class="section-card" style="margin:0;padding:1rem 1.2rem"><div style="font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fog);margin-bottom:.35rem">${t.type}</div><div style="font-family:var(--serif);font-size:1.3rem;color:var(--ink)">${fmt$(t.amt)}</div><div style="font-family:var(--mono);font-size:.6rem;color:var(--fog);margin-top:.2rem">${t.n} txn${t.n!==1?'s':''}</div></div>`).join('')}
    <div class="section-card" style="margin:0;padding:1rem 1.2rem;border-left:3px solid var(--gold)"><div style="font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--fog);margin-bottom:.35rem">Total Settled</div><div style="font-family:var(--serif);font-size:1.3rem;color:var(--ink);font-weight:600">${fmt$(grand)}</div><div style="font-family:var(--mono);font-size:.6rem;color:${refunds.length?'var(--red)':'var(--fog)'};margin-top:.2rem">${refunds.length?refunds.length+' refund'+(refunds.length!==1?'s':'')+' · '+fmt$(refunds.reduce((s,r)=>s+r.amount,0)):'no refunds'}</div></div>
  </div>`;
  // PMS ↔ Processor matching (Loop 1). Business Track's Invoice Number carries
  // HotelKey's transaction number, so card settlements match deterministically
  // on invoice + amount. Match is searched across ALL loaded processor rows
  // (not just this date) because after-midnight charges carry the next txn_date.
  const CARD_TYPES=['VISA','MASTER','AMEX','DISCOVER'];
  const hkCards=rows.filter(r=>CARD_TYPES.includes(r.payment_type));
  const allBt=(S.procTx||[]).filter(r=>r.property===prop);
  const btForDate=allBt.filter(r=>r.txn_date===d||r.txn_date===nextDay(d));
  const usedBt=new Set();
  const hkResults=hkCards.map(h=>{
    const m=allBt.find(b=>!usedBt.has(b.id)&&b.invoice_number&&h.transaction_number&&b.invoice_number.toUpperCase()===String(h.transaction_number).toUpperCase()&&Math.abs((b.amount||0)-(h.amount||0))<0.01);
    if(m) usedBt.add(m.id);
    return {hk:h,bt:m||null};
  });
  const matched=hkResults.filter(r=>r.bt).length;
  const hkOnly=hkResults.filter(r=>!r.bt);
  const btOnly=btForDate.filter(b=>!usedBt.has(b.id)&&!hkResults.some(r=>r.bt&&r.bt.id===b.id));
  const btCoverage=allBt.length>0&&btForDate.length>0;
  const badge=document.getElementById('recon-match-badge');
  if(!allBt.length){ badge.className='section-badge badge-info'; badge.textContent='no processor data yet'; }
  else if(!btCoverage){ badge.className='section-badge badge-info'; badge.textContent='processor file pending'; }
  else if(!hkOnly.length&&!btOnly.length){ badge.className='section-badge badge-ok'; badge.textContent=`${matched}/${hkCards.length} matched`; }
  else { badge.className='section-badge badge-warn'; badge.textContent=`${hkOnly.length+btOnly.length} exception${hkOnly.length+btOnly.length!==1?'s':''}`; }
  document.getElementById('recon-match').innerHTML=!allBt.length
    ?`<div style="padding:1rem 1.4rem;font-family:var(--mono);font-size:.68rem;color:var(--fog)">Waiting for the first Business Track daily settlement file. Once it flows, card settlements are matched here automatically by invoice number + amount.</div>`
    :!btCoverage
    ?`<div style="padding:1rem 1.4rem;font-family:var(--mono);font-size:.68rem;color:var(--fog)">The processor batch covering this business date hasn't been received yet — Business Track's file for ${fmtDate(d)} typically arrives ${fmtDate(nextDay(nextDay(d)))} morning.</div>`
    :`<div style="display:flex;gap:1.5rem;padding:.9rem 1.4rem;flex-wrap:wrap;font-family:var(--mono);font-size:.68rem">
        <span style="color:var(--green)">✓ ${matched} matched (${fmt$(hkResults.filter(r=>r.bt).reduce((s,r)=>s+(r.hk.amount||0),0))})</span>
        <span style="color:${hkOnly.length?'var(--red)':'var(--fog)'}">${hkOnly.length} in PMS only</span>
        <span style="color:${btOnly.length?'var(--red)':'var(--fog)'}">${btOnly.length} at processor only</span>
      </div>`
      +((hkOnly.length||btOnly.length)?`<div class="tbl-wrap"><table class="data-table"><thead><tr><th>Where</th><th>Reference</th><th>Guest / Detail</th><th>Type</th><th class="r">Amount</th><th>Note</th></tr></thead><tbody>
        ${hkOnly.map(r=>`<tr style="background:var(--red-lt)"><td class="mono" style="font-size:.68rem">PMS only</td><td class="mono" style="font-size:.72rem">${r.hk.transaction_number||'—'}</td><td>${r.hk.guest_name||'—'}</td><td class="mono" style="font-size:.7rem">${r.hk.payment_type} ${r.hk.payment_detail||''}</td><td class="r" style="font-weight:600">${fmt$(r.hk.amount)}</td><td style="font-size:.72rem;color:var(--fog)">posted in HotelKey, not found at processor</td></tr>`).join('')}
        ${btOnly.map(b=>`<tr style="background:var(--red-lt)"><td class="mono" style="font-size:.68rem">Processor only</td><td class="mono" style="font-size:.72rem">${b.invoice_number||'—'}</td><td class="mono" style="font-size:.72rem">card ···${b.account_last4||'—'}</td><td class="mono" style="font-size:.7rem">${b.network||'—'}</td><td class="r" style="font-weight:600">${fmt$(b.amount)}</td><td style="font-size:.72rem;color:var(--fog)">processed ${b.txn_date?fmtDate(b.txn_date):''}, no matching PMS settlement</td></tr>`).join('')}
      </tbody></table></div>`:'');

  // 14-day matrix
  const dates=reconDates().slice(0,14);
  const allTypes=[...new Set([...RECON_TYPE_ORDER.filter(t=>(S.settlements||[]).some(r=>r.property===prop&&r.payment_type===t)),...(S.settlements||[]).filter(r=>r.property===prop).map(r=>r.payment_type||'OTHER')])];
  const ordered=[...RECON_TYPE_ORDER.filter(t=>allTypes.includes(t)),...allTypes.filter(t=>!RECON_TYPE_ORDER.includes(t)).sort()];
  document.getElementById('recon-matrix').innerHTML=`<div class="tbl-wrap"><table class="data-table"><thead><tr><th>Date</th>${ordered.map(t=>`<th class="r">${t}</th>`).join('')}<th class="r">Total</th></tr></thead><tbody>
    ${dates.map(dt=>{
      const dr=(S.settlements||[]).filter(r=>r.property===prop&&r.date===dt);
      const tm={}; dr.forEach(r=>{ const t=r.payment_type||'OTHER'; tm[t]=(tm[t]||0)+(r.amount||0); });
      const tot=dr.reduce((s,r)=>s+(r.amount||0),0);
      return `<tr${dt===d?' style="background:var(--cream)"':''}><td class="mono" style="font-size:.75rem;${dt===d?'font-weight:600':''}">${fmtDate(dt)}</td>${ordered.map(t=>`<td class="r"${tm[t]==null?' style="color:var(--fog)"':''}>${tm[t]!=null?fmt$(Math.round(tm[t]*100)/100):'—'}</td>`).join('')}<td class="r" style="font-weight:600">${fmt$(Math.round(tot*100)/100)}</td></tr>`;
    }).join('')}
  </tbody></table></div>`;
  // Transaction detail
  document.getElementById('recon-date-lbl').textContent=fmtDate(d);
  document.getElementById('recon-count').textContent=rows.length+' transactions';
  document.getElementById('recon-tx').innerHTML=rows.length
    ?`<div class="tbl-wrap" style="max-height:440px;overflow-y:auto"><table class="data-table sticky-head"><thead><tr><th>Time</th><th>Guest / Account</th><th>Room</th><th>Type</th><th>Card</th><th class="r">Amount</th><th>User</th><th>Remarks</th></tr></thead><tbody>
      ${rows.map(r=>{const neg=(r.amount||0)<0;return `<tr${neg?' style="background:var(--red-lt)"':''}><td class="mono" style="font-size:.72rem">${(r.time||'—').slice(0,5)}</td><td style="${neg?'color:var(--red);font-weight:600':''}">${r.guest_name||'—'}${r.account_name?` <span class="pill pill-blue" style="font-size:.6rem">${r.account_name}</span>`:''}</td><td class="mono" style="font-size:.75rem">${r.room_number||'—'}</td><td class="mono" style="font-size:.7rem">${r.payment_type||'—'}</td><td class="mono" style="font-size:.75rem">${r.payment_detail||'—'}</td><td class="r" style="${neg?'color:var(--red);font-weight:600':'font-weight:500'}">${fmt$(r.amount)}</td><td class="mono" style="font-size:.68rem">${r.username||'—'}</td><td style="font-size:.75rem;color:var(--fog);max-width:260px">${r.remarks||'—'}</td></tr>`;}).join('')}
    </tbody><tfoot><tr class="tot"><td colspan="5">Total</td><td class="r">${fmt$(grand)}</td><td colspan="2"></td></tr></tfoot></table></div>`
    :empty('No settlements for this date','');
}
function wireReconciliation(){
  document.getElementById('recon-date')?.addEventListener('change',e=>{ S.reconDate=e.target.value; renderReconContent(); });
  renderReconContent();
}

function buildReputation(){
  const prop=vp();
  const snapshots=(S.repSnapshots||[]).filter(r=>r.property===prop);
  const gSnap=snapshots.find(r=>r.platform==='google')||null;
  const taSnap=snapshots.find(r=>r.platform==='tripadvisor')||null;
  const gReviews=(S.repReviews||[]).filter(r=>r.property===prop&&r.platform==='google').slice(0,10);
  const taReviews=(S.repReviews||[]).filter(r=>r.property===prop&&r.platform==='tripadvisor').slice(0,10);
  const surveys=(S.medalliaSurveys||[]).filter(r=>r.property===prop);
  const recent10=surveys.slice(0,10);
  const avgScore=surveys.length?Math.round(surveys.reduce((s,r)=>s+(r.overall_score||0),0)/surveys.length*10)/10:null;
  const pct10=surveys.length?Math.round(surveys.filter(r=>r.overall_score>=9).length/surveys.length*100):null;

  function starHtml(rating,max=5){
    if(!rating) return '<span style="color:var(--fog)">—</span>';
    const pct=Math.round((rating/max)*100);
    return `<span style="font-size:1.1rem;letter-spacing:.05rem" title="${rating}/${max}">
      <span style="background:linear-gradient(90deg,var(--gold) ${pct}%,var(--border) ${pct}%);-webkit-background-clip:text;-webkit-text-fill-color:transparent">★★★★★</span>
    </span>`;
  }
  function reviewCard(r){
    const stars='★'.repeat(Math.round(r.rating||0))+'☆'.repeat(5-Math.round(r.rating||0));
    return `<div style="padding:1.1rem 1.75rem;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem">
        <div style="font-weight:600;font-size:.95rem">${r.reviewer_name||'Anonymous'}</div>
        <div style="display:flex;align-items:center;gap:.75rem">
          <span style="color:var(--gold);font-size:1rem;letter-spacing:.05rem">${stars}</span>
          <span class="mono" style="font-size:.72rem;color:var(--fog)">${r.review_date?fmtDate(r.review_date):''}</span>
        </div>
      </div>
      <div style="font-size:.88rem;color:var(--ink3);line-height:1.6">${(r.review_text||'').replace(/</g,'&lt;')}</div>
    </div>`;
  }
  function platformSection(label,snap,reviews,color,setupNote){
    const ratingDisplay=snap?.rating?`<span style="font-family:var(--serif);font-size:2.6rem;color:var(--ink);line-height:1">${snap.rating}</span><span style="font-size:1rem;color:var(--fog)">/5</span>`:null;
    const badgeText=snap?.rating?snap.rating+' / 5 · '+(snap.review_count||'?')+' reviews':reviews.length?reviews.length+' review'+(reviews.length!==1?'s':'')+' · no aggregate yet':'No data yet';
    const badgeCls=snap?.rating?'badge-ok':reviews.length?'badge-info':'badge-info';
    return `<div class="section-card">
      <div class="section-head">
        <div class="section-title">${label}</div>
        <div class="section-badge ${badgeCls}">${badgeText}</div>
      </div>
      ${snap?.rating?`
        <div style="padding:1.25rem 1.75rem;display:flex;align-items:center;gap:1.5rem;border-bottom:1px solid var(--border)">
          <div>${ratingDisplay}</div>
          <div>${starHtml(snap.rating)}</div>
          <div style="font-family:var(--mono);font-size:.7rem;color:var(--fog)">${snap.review_count||0} reviews<br>Updated ${snap.updated_at?new Date(snap.updated_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</div>
        </div>`:''}
      ${reviews.length?`<div style="max-height:480px;overflow-y:auto">${reviews.map(reviewCard).join('')}</div>`
        :`<div style="padding:1.75rem"><div style="font-family:var(--mono);font-size:.75rem;color:var(--fog);line-height:1.9">${setupNote}</div></div>`}
    </div>`;
  }

  const googleSetup=`To populate Google reviews automatically, you need a Google Places API key.<br>
    For now, ratings and reviews can be entered manually via Supabase.<br>
    Table: <b>reputation_snapshots</b> (overall rating) · <b>reputation_reviews</b> (individual reviews).`;
  const taSetup=`TripAdvisor does not provide a public reviews API.<br>
    Ratings and reviews can be entered manually via Supabase.<br>
    Table: <b>reputation_snapshots</b> (overall rating) · <b>reputation_reviews</b> (individual reviews).`;

  return `<div class="page-header"><div class="page-title">Reputation</div><div class="page-sub">${(S.props||PROPS)[prop]?.name||prop} · Guest Reviews &amp; Surveys</div></div>
  <div class="content">
    <div class="kpi-grid">
      <div class="kpi-card ${gSnap?.rating>=4.5?'green':gSnap?.rating>=4?'gold':'amber'}">
        <div class="kpi-label">Google Rating</div>
        <div class="kpi-value">${gSnap?.rating??'—'}</div>
        <div class="kpi-meta">${gSnap?.review_count?gSnap.review_count+' reviews':'No data'}</div>
      </div>
      <div class="kpi-card ${taSnap?.rating>=4?'green':taSnap?.rating>=3.5?'gold':'amber'}">
        <div class="kpi-label">TripAdvisor Rating</div>
        <div class="kpi-value">${taSnap?.rating??'—'}</div>
        <div class="kpi-meta">${taSnap?.review_count?taSnap.review_count+' reviews':'No data'}</div>
      </div>
      <div class="kpi-card ${avgScore>=9?'green':avgScore>=7?'gold':'amber'}">
        <div class="kpi-label">Medallia Avg Score</div>
        <div class="kpi-value">${avgScore??'—'}</div>
        <div class="kpi-meta">${surveys.length} survey${surveys.length!==1?'s':''}${pct10!==null?' · '+pct10+'% scored 9–10':''}</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Recent Medallia</div>
        <div class="kpi-value">${recent10.length?recent10[0].overall_score+'<span style="font-size:1.2rem;color:var(--fog)">/10</span>':'—'}</div>
        <div class="kpi-meta">${recent10.length?'Last: '+(recent10[0].guest_name||'Guest')+' · '+fmtDate(recent10[0].survey_date):'No surveys yet'}</div>
      </div>
    </div>

    ${platformSection('Google Reviews',gSnap,gReviews,'green',googleSetup)}
    ${platformSection('TripAdvisor Reviews',taSnap,taReviews,'blue',taSetup)}

    <div class="alert-strip" style="background:var(--gold-lt);border:1px solid rgba(201,151,58,.25);border-radius:var(--radius);margin-bottom:1.5rem">
      <span class="alert-chip warn" style="font-size:.75rem;padding:.35rem .9rem">📋 Please check Medallia on <a href="https://concerto.ihg.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">IHG Concerto</a> everyday.</span>
    </div>

    <div class="section-card">
      <div class="section-head">
        <div class="section-title">Medallia Guest Surveys</div>
        <div class="section-badge ${surveys.length?'badge-ok':'badge-info'}">${surveys.length} survey${surveys.length!==1?'s':''} · avg ${avgScore??'—'}/10</div>
      </div>
      ${surveys.length?`<div class="tbl-wrap" style="max-height:520px;overflow-y:auto">
        <table class="data-table sticky-head">
          <thead><tr><th>Date</th><th>Guest</th><th class="r">Score</th><th>Comments</th></tr></thead>
          <tbody>${surveys.map(r=>{
            const s=r.overall_score??null;
            const isGoogle=(r.comments||'').startsWith('Google Review');
            const denom=isGoogle?5:10;
            const color=isGoogle?(s>=4?'var(--green)':s>=3?'var(--amber)':'var(--red)'):(s>=9?'var(--green)':s>=7?'var(--amber)':'var(--red)');
            const commentDisplay=isGoogle?((r.comments||'').replace(/^Google Review\s*·?\s*/,'').trim()||'—'):(r.comments||'—');
            return `<tr>
              <td class="mono" style="white-space:nowrap">${fmtDate(r.survey_date)}</td>
              <td style="font-weight:500;white-space:nowrap">${isGoogle?'<span class="pill pill-blue" style="font-size:.65rem">Google</span>':r.guest_name||'—'}</td>
              <td class="r"><span style="font-family:var(--serif);font-size:1.3rem;font-weight:700;color:${color}">${s??'—'}</span><span style="color:var(--fog);font-size:.75rem">/${denom}</span></td>
              <td style="font-size:.88rem;color:var(--ink3);line-height:1.55;max-width:480px">${commentDisplay.replace(/</g,'&lt;')}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`
      :empty('No Medallia surveys yet','Surveys will appear here once the email automation is set up')}
    </div>
  </div>`;
}

function buildOwnerAccountability(){
  const curMonth=localISODate().slice(0,7);
  const activeCodes=Object.entries(PROPS).filter(([,p])=>p.active).map(([c])=>c);

  // Aggregate override impact by staff across all properties
  const allOvrMTD=S.overrides.filter(r=>r.stay_date?.startsWith(curMonth));
  const totalOvrImpact=allOvrMTD.reduce((s,r)=>s+(r.override_amount||0),0);

  // Adjustments MTD
  const allAdjMTD=S.adjActivity.filter(r=>r.date?.startsWith(curMonth));
  const allRefundsMTD=allAdjMTD.filter(r=>r.section==='Refunds'||r.section==='Manager Refund');

  // User actions MTD
  const allUserMTD=S.userActivity.filter(r=>r.date?.startsWith(curMonth));

  // Override by staff cross-property
  const byStaff={};
  S.overrides.forEach(r=>{
    const u=r.username||'Unknown', p=r.property||'?';
    if(!byStaff[u]) byStaff[u]={total:0,count:0,props:{}};
    byStaff[u].count++; byStaff[u].total+=(r.override_amount||0);
    byStaff[u].props[p]=(byStaff[u].props[p]||0)+(r.override_amount||0);
  });
  const staffRows=Object.entries(byStaff).sort((a,b)=>a[1].total-b[1].total);

  // Per-property summary
  const propRows=activeCodes.map(code=>{
    const ovrMTD=S.overrides.filter(r=>r.property===code&&r.stay_date?.startsWith(curMonth));
    const adjMTD=S.adjActivity.filter(r=>r.property===code&&r.date?.startsWith(curMonth));
    const userMTD=S.userActivity.filter(r=>r.property===code&&r.date?.startsWith(curMonth));
    return {code, ovrCount:ovrMTD.length, ovrImpact:ovrMTD.reduce((s,r)=>s+(r.override_amount||0),0), adjCount:adjMTD.filter(r=>r.section==='Adjustments'||r.section==='Manager Charge Adjustments').length, adjAmt:adjMTD.filter(r=>r.section==='Adjustments'||r.section==='Manager Charge Adjustments').reduce((s,r)=>s+(r.adjusted_amount||0),0), refCount:adjMTD.filter(r=>r.section==='Refunds'||r.section==='Manager Refund').length, refAmt:adjMTD.filter(r=>r.section==='Refunds'||r.section==='Manager Refund').reduce((s,r)=>s+Math.abs(r.adjusted_amount||0),0), userActions:userMTD.length};
  });

  return `<div class="page-header"><div class="page-title">Owner Accountability</div><div class="page-sub">All Active Properties · MTD ${curMonth}</div></div>
  <div class="content">
    <div class="kpi-grid">
      <div class="kpi-card amber"><div class="kpi-label">Override Impact MTD</div><div class="kpi-value">${fmt$(totalOvrImpact||null)}</div><div class="kpi-meta">${allOvrMTD.length} overrides across all properties</div></div>
      <div class="kpi-card ${allAdjMTD.filter(r=>r.section==='Adjustments'||r.section==='Manager Charge Adjustments').length>0?'amber':'green'}"><div class="kpi-label">Adjustments MTD</div><div class="kpi-value">${allAdjMTD.filter(r=>r.section==='Adjustments'||r.section==='Manager Charge Adjustments').length}</div><div class="kpi-meta">${fmt$(allAdjMTD.filter(r=>r.section==='Adjustments'||r.section==='Manager Charge Adjustments').reduce((s,r)=>s+(r.adjusted_amount||0),0))} across all properties</div></div>
      <div class="kpi-card ${allRefundsMTD.length>0?'red':'green'}"><div class="kpi-label">Refunds MTD</div><div class="kpi-value">${allRefundsMTD.length}</div><div class="kpi-meta">${fmt$(allRefundsMTD.reduce((s,r)=>s+Math.abs(r.adjusted_amount||0),0))} total refunded</div></div>
      <div class="kpi-card gold"><div class="kpi-label">Reservation Actions MTD</div><div class="kpi-value">${allUserMTD.length}</div><div class="kpi-meta">Across all active properties</div></div>
    </div>

    <div class="section-card"><div class="section-head"><div class="section-title">MTD Summary by Property</div></div>
      <div class="tbl-wrap"><table class="data-table"><thead><tr><th>Property</th><th class="r">Overrides</th><th class="r">Override Impact</th><th class="r">Adjustments</th><th class="r">Adj Amount</th><th class="r">Refunds</th><th class="r">Refund Amount</th><th class="r">Res. Actions</th></tr></thead>
      <tbody>${propRows.map(p=>`<tr><td><span class="pill pill-blue">${p.code}</span> ${PROPS[p.code]?.short}</td><td class="r mono">${p.ovrCount}</td><td class="r"><span class="${p.ovrImpact<0?'pill pill-red':'pill pill-green'}">${fmt$(p.ovrImpact)}</span></td><td class="r mono">${p.adjCount}</td><td class="r mono">${fmt$(p.adjAmt)}</td><td class="r mono"><span class="${p.refCount>0?'pill pill-red':'pill pill-gray'}">${p.refCount}</span></td><td class="r mono" style="${p.refAmt>0?'color:var(--red)':''}">${p.refAmt>0?fmt$(p.refAmt):'—'}</td><td class="r mono">${p.userActions}</td></tr>`).join('')}</tbody>
      </table></div>
    </div>

    <div class="section-card"><div class="section-head"><div class="section-title">Override Impact by Staff — All Properties</div><div class="section-badge badge-warn">${S.overrides.length} total overrides</div></div>
      ${staffRows.length?`<div class="tbl-wrap"><table class="data-table"><thead><tr><th>Staff Member</th><th class="r">Count</th><th class="r">Net Impact</th>${activeCodes.map(c=>`<th class="r">${c}</th>`).join('')}</tr></thead><tbody>${staffRows.map(([name,d])=>`<tr><td style="font-weight:500">${name}</td><td class="r mono">${d.count}</td><td class="r"><span class="${d.total<0?'pill pill-red':'pill pill-green'}">${fmt$(d.total)}</span></td>${activeCodes.map(c=>`<td class="r mono">${d.props[c]!=null?fmt$(d.props[c]):'—'}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`:empty('No override data','Upload Rate Override reports for active properties')}
    </div>

    ${(()=>{const allRef=S.adjActivity.filter(r=>r.date?.startsWith(curMonth)&&(r.section==='Refunds'||r.section==='Manager Refund')); return allRef.length?`<div class="section-card"><div class="section-head"><div class="section-title">Refunds MTD — All Properties</div><div class="section-badge badge-alert">${allRef.length} refunds · ${fmt$(allRef.reduce((s,r)=>s+Math.abs(r.adjusted_amount||0),0))}</div></div><div class="tbl-wrap"><table class="data-table"><thead><tr><th>Date</th><th>Property</th><th>Type</th><th>Guest</th><th>Room</th><th>Payment</th><th>Reason</th><th class="r">Amount</th><th>Processed By</th></tr></thead><tbody>${allRef.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(r=>`<tr style="background:rgba(185,28,28,.03)"><td class="mono">${fmtDate(r.date)}</td><td><span class="pill pill-blue">${r.property}</span></td><td><span class="pill pill-red">${r.section==='Manager Refund'?'Mgr Refund':'Refund'}</span></td><td style="font-weight:500">${r.guest_name||'—'}</td><td class="mono">${r.room_number||'—'}</td><td class="mono" style="font-size:.7rem">${r.charge_type||'—'}</td><td style="font-size:.75rem;color:var(--ink3)">${r.adjustment_reason||'—'}</td><td class="r mono" style="color:var(--red);font-weight:600">${fmt$(Math.abs(r.adjusted_amount))}</td><td class="mono" style="font-size:.7rem;font-weight:500">${r.username||'—'}</td></tr>`).join('')}</tbody><tfoot><tr class="tot"><td colspan="7">Total Refunded MTD</td><td class="r" style="color:var(--red)">${fmt$(allRef.reduce((s,r)=>s+Math.abs(r.adjusted_amount||0),0))}</td><td></td></tr></tfoot></table></div></div>`:empty('No refunds this month','');})()}

function wireUploadView(id){
  const zone=document.getElementById(id+'-zone'), input=document.getElementById(id+'-input');
  const results=document.getElementById(id+'-results'), commit=document.getElementById(id+'-commit');
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover')});
  zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('dragover');handleFiles([...e.dataTransfer.files],id)});
  input.addEventListener('change',()=>handleFiles([...input.files],id));
  commit.addEventListener('click',()=>commitFiles(id));
}
async function handleFiles(files,id){
  // No browser parsing — just queue files for Edge Function processing
  S.pending=[...files];
  const results=document.getElementById(id+'-results');
  results.innerHTML='';
  for(const file of files){
    const ext=file.name.split('.').pop().toLowerCase();
    const isValid=['pdf','xlsx','xls'].includes(ext);
    results.innerHTML+=`<div class="upload-item">
      <div style="font-size:1rem">${ext==='xlsx'?'📊':'📄'}</div>
      <div class="upload-item-name">${file.name}</div>
      <span class="upload-item-type ${isValid?'type-ok':'type-unk'}">${isValid?'Ready to upload':'Unsupported'}</span>
      <div class="upload-item-note">${isValid?'→ will send to processor':'skipped'}</div>
    </div>`;
  }
  const commit=document.getElementById(id+'-commit');
  const validFiles=files.filter(f=>['pdf','xlsx','xls'].includes(f.name.split('.').pop().toLowerCase()));
  commit.disabled=validFiles.length===0;
  commit.textContent=validFiles.length>0?`Upload ${validFiles.length} file${validFiles.length>1?'s':''} for Processing`:'Upload for Processing';
}
async function commitFiles(id){
  const propEl=document.getElementById(id+'-prop');
  const prop=propEl?propEl.value:S.mode;
  const commit=document.getElementById(id+'-commit');
  const results=document.getElementById(id+'-results');
  commit.disabled=true; commit.textContent='Processing...';

  const validFiles=S.pending.filter(f=>['pdf','xlsx','xls'].includes(f.name.split('.').pop().toLowerCase()));
  let saved=0, errors=0;

  for(const file of validFiles){
    // Update status to processing
    const items=results.querySelectorAll('.upload-item');
    for(const item of items){
      if(item.querySelector('.upload-item-name')?.textContent===file.name){
        item.querySelector('.upload-item-note').textContent='Sending to processor...';
      }
    }

    try {
      // Send file directly to Edge Function as multipart form data
      const formData=new FormData();
      formData.append('file', file);
      formData.append('property', prop);

      const res=await fetch(EDGE_FN_URL, {
        method:'POST',
        headers:{ 'Authorization':'Bearer '+SUPABASE_KEY },
        body: formData
      });

      const result=await res.json();

      // Update status in results list
      for(const item of items){
        if(item.querySelector('.upload-item-name')?.textContent===file.name){
          const note=item.querySelector('.upload-item-note');
          const badge=item.querySelector('.upload-item-type');
          if(result.success){
            note.textContent=`Saved ${result.rows} row${result.rows!==1?'s':''} — ${result.type}`;
            badge.className='upload-item-type type-ok';
            badge.textContent=result.type?.replace(/_/g,' ')||'Processed';
            saved++;
          } else {
            note.textContent='Error: '+(result.error||'Unknown error');
            badge.className='upload-item-type type-err';
            errors++;
          }
        }
      }
    } catch(e){
      console.error(file.name, e);
      errors++;
      for(const item of items){
        if(item.querySelector('.upload-item-name')?.textContent===file.name){
          item.querySelector('.upload-item-note').textContent='Network error: '+e.message;
          item.querySelector('.upload-item-type').className='upload-item-type type-err';
        }
      }
    }
  }

  await loadAllData();
  toast(
    errors===0?`Processed ${saved} file${saved!==1?'s':''} for ${prop}`:`${saved} processed, ${errors} failed`,
    errors===0?'success':'error'
  );
  commit.disabled=false;
  commit.textContent='Upload for Processing';
  S.pending=[];
}

function overrideTableHtml(rows){
  return `<table class="data-table"><thead><tr><th>Date</th><th>Guest</th><th>Room</th><th class="r">Sold Rate</th><th class="r">New Rate</th><th class="r">Difference</th><th>By</th><th>Reason</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="mono">${r.stay_date||'—'}</td><td>${r.guest_name||'—'}</td><td class="mono">${r.room_number||'—'}</td><td class="r">${fmt$(r.sold_rate)}</td><td class="r">${fmt$(r.new_rate)}</td><td class="r"><span class="${(r.override_amount||0)<0?'pill pill-red':'pill pill-green'}">${fmt$(r.override_amount)}</span></td><td class="mono" style="font-size:.7rem">${r.username||'—'}</td><td style="font-size:.78rem;color:var(--fog)">${r.override_reason||'—'}</td></tr>`).join('')}</tbody><tfoot><tr class="tot"><td colspan="5">Total</td><td class="r">${fmt$(rows.reduce((s,r)=>s+(r.override_amount||0),0))}</td><td colspan="2"></td></tr></tfoot></table>`;
}
function adjTableHtml(rows){
  return `<table class="data-table"><thead><tr><th>Date</th><th>Type</th><th>Guest</th><th>Room</th><th class="r">Amount</th><th>By</th><th>Remarks</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="mono">${r.date||'—'}</td><td><span class="pill ${r.transaction_type==='REFUND'?'pill-red':r.transaction_type==='ADJUSTMENT'?'pill-amber':'pill-gray'}">${r.transaction_type||'—'}</span></td><td>${r.guest_name||'—'}</td><td class="mono">${r.room_number||'—'}</td><td class="r">${fmt$(r.adjusted_amount||r.transferred_charge)}</td><td class="mono" style="font-size:.7rem">${r.username||'—'}</td><td style="font-size:.78rem;color:var(--fog)">${r.remarks||'—'}</td></tr>`).join('')}</tbody></table>`;
}
function agingCellHtml(co){
  const vals=[co.current_bal,co.over_30,co.over_60,co.over_90,co.over_120,co.over_150].map(v=>v||0);
  const max=Math.max(...vals)||1, pct=v=>Math.round(v/max*100);
  const labels=['Current','30+','60+','90+','120+','150+'], cls=['fill-cur','fill-30','fill-60','fill-90','fill-120','fill-150'];
  return `<div class="aging-cell"><div class="aging-co">${(co.company||'').replace('_',' ')} ${co.property?'· '+co.property:''}</div><div class="aging-tot">${fmt$(co.total)}</div>${vals.map((v,i)=>`<div class="aging-row"><div class="aging-lbl">${labels[i]}</div><div class="aging-track"><div class="aging-fill ${cls[i]}" style="width:${pct(v)}%"></div></div><div class="aging-val">${fmt$(v)}</div></div>`).join('')}</div>`;
}
