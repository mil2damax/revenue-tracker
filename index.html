<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milkam Catbird Seat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1117;--ink2:#1c2333;--ink3:#2d3748;
  --fog:#8892a4;--mist:#c8d0dc;--border:#e2e0db;
  --paper:#f5f2ec;--cream:#faf8f4;--white:#ffffff;
  --gold:#c9973a;--gold-lt:#f5e9cc;--gold-dim:#3d2e10;
  --red:#b91c1c;--red-lt:#fef2f2;
  --green:#15803d;--green-lt:#f0fdf4;
  --amber:#b45309;--amber-lt:#fffbeb;
  --blue:#1d4ed8;--blue-lt:#eff6ff;
  --shadow:0 1px 3px rgba(13,17,23,.07),0 4px 16px rgba(13,17,23,.04);
  --shadow-lg:0 8px 32px rgba(13,17,23,.12);
  --radius:10px;
  --mono:'DM Mono',monospace;
  --serif:'Cormorant Garamond',serif;
  --sans:'DM Sans',sans-serif;
}
html{font-size:15px}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
#entry-screen{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .45s ease}
#entry-screen.hidden{opacity:0;pointer-events:none}
.entry-logo{font-family:var(--serif);font-size:2.6rem;color:var(--gold);letter-spacing:.02em;margin-bottom:.2rem}
.entry-tagline{font-family:var(--mono);font-size:.62rem;color:var(--fog);letter-spacing:.2em;text-transform:uppercase;margin-bottom:3rem}
#prop-selector{display:flex;flex-direction:column;gap:.75rem;width:320px}
.prop-btn{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;cursor:pointer;transition:all .15s ease;text-align:left}
.prop-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(201,151,58,.4)}
.prop-btn.owner-btn{border-color:rgba(201,151,58,.3);background:rgba(201,151,58,.06)}
.prop-btn.owner-btn:hover{background:rgba(201,151,58,.12)}
.prop-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.prop-icon.owner{background:rgba(201,151,58,.15)}
.prop-icon.wkfcw{background:rgba(29,78,216,.15)}
.prop-icon.rdurm{background:rgba(21,128,61,.15)}
.prop-icon.rdutt{background:rgba(180,83,9,.15)}
.prop-name{font-family:var(--sans);font-size:.9rem;font-weight:500;color:#fff;line-height:1.2}
.prop-code{font-family:var(--mono);font-size:.58rem;color:var(--fog);letter-spacing:.1em;margin-top:.15rem}
.prop-coming{font-family:var(--mono);font-size:.55rem;color:rgba(201,151,58,.6);letter-spacing:.08em;margin-left:auto;flex-shrink:0}
#pin-screen{display:none;flex-direction:column;align-items:center}
#pin-screen.show{display:flex}
.pin-back{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--fog);background:none;border:1px solid rgba(255,255,255,.08);border-radius:6px;cursor:pointer;margin-bottom:2rem;padding:.5rem 1rem;transition:all .15s}
.pin-back:hover{color:var(--mist);border-color:rgba(255,255,255,.2)}
.pin-for{font-family:var(--serif);font-size:1.4rem;color:var(--gold);margin-bottom:.25rem}
.pin-label{font-family:var(--mono);font-size:.6rem;color:var(--fog);letter-spacing:.15em;text-transform:uppercase;margin-bottom:1.5rem}
.pin-dots{display:flex;gap:10px;margin-bottom:2rem}
.pin-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--fog);transition:all .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(201,151,58,.4)}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,58px);gap:9px}
.pin-key{width:58px;height:58px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-family:var(--sans);font-size:1.2rem;font-weight:300;cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center}
.pin-key:hover{background:rgba(255,255,255,.12)}
.pin-key:active{transform:scale(.92)}
.pin-key.wide{border-radius:29px;font-size:.7rem;letter-spacing:.1em}
.pin-err{font-family:var(--mono);font-size:.62rem;color:var(--red);letter-spacing:.1em;margin-top:1.25rem;opacity:0;transition:opacity .2s}
.pin-err.show{opacity:1}
#app{display:none}
#app.visible{display:block}
.topbar{position:sticky;top:0;z-index:100;background:var(--ink);display:flex;align-items:center;padding:0 1.5rem;height:52px;gap:1.5rem}
.topbar-brand{font-family:var(--serif);font-size:1.1rem;color:var(--gold);flex-shrink:0;letter-spacing:.02em}
.topbar-prop-tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;padding:.25rem .65rem;border-radius:20px;flex-shrink:0}
.tag-owner{background:rgba(201,151,58,.15);color:var(--gold)}
.tag-wkfcw{background:rgba(29,78,216,.15);color:#93c5fd}
.tag-rdurm{background:rgba(21,128,61,.15);color:#86efac}
.tag-rdutt{background:rgba(180,83,9,.15);color:#fcd34d}
.topbar-nav{display:flex;gap:0;margin-left:auto;align-items:center}
.nav-btn{padding:0 .9rem;height:52px;border:none;background:none;color:var(--fog);font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;white-space:nowrap}
.nav-btn:hover{color:var(--mist)}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.admin-wrap{position:relative;margin-left:.25rem}
.admin-btn{padding:0 .75rem;height:30px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--fog);font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.35rem}
.admin-btn:hover{border-color:rgba(255,255,255,.25);color:var(--mist)}
.admin-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--ink2);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.35rem;min-width:160px;z-index:200;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.admin-menu.open{display:block}
.admin-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-radius:5px;color:var(--fog);font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;cursor:pointer;transition:background .12s;text-transform:uppercase;border:none;background:none;width:100%;text-align:left}
.admin-item:hover{background:rgba(255,255,255,.07);color:var(--mist)}
.admin-item.active-item{color:var(--gold)}
.topbar-actions{display:flex;gap:.5rem;margin-left:.75rem}
.topbar-action-btn{padding:0 .75rem;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--fog);font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.topbar-action-btn:hover{border-color:var(--gold);color:var(--gold)}
.view{display:none}
.view.active{display:block}
.page-header{padding:2rem 2.5rem 1.5rem;border-bottom:1px solid var(--border);background:var(--cream)}
.page-title{font-family:var(--serif);font-size:2.1rem;color:var(--ink);margin-bottom:.3rem}
.page-sub{font-family:var(--mono);font-size:.72rem;color:var(--fog);letter-spacing:.12em;text-transform:uppercase}
.content{padding:2rem 2.5rem;max-width:1440px;margin:0 auto}
@media(max-width:900px){.content{padding:1rem}}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.25rem;margin-bottom:2rem}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem 1.75rem;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.kpi-card.gold::before{background:var(--gold)}.kpi-card.green::before{background:var(--green)}.kpi-card.blue::before{background:var(--blue)}.kpi-card.red::before{background:var(--red)}.kpi-card.amber::before{background:var(--amber)}
.kpi-label{font-family:var(--mono);font-size:.68rem;letter-spacing:.11em;text-transform:uppercase;color:var(--fog);margin-bottom:.55rem}
.kpi-value{font-family:var(--serif);font-size:2.6rem;color:var(--ink);line-height:1;margin-bottom:.4rem}
.kpi-delta{font-family:var(--mono);font-size:.67rem}
.kpi-delta.up{color:var(--green)}.kpi-delta.down{color:var(--red)}.kpi-delta.flat{color:var(--fog)}
.kpi-meta{font-family:var(--mono);font-size:.65rem;color:var(--mist);margin-top:.2rem}
.section-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:1.5rem;overflow:hidden}
.section-head{padding:1.1rem 1.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--cream);gap:1rem}
.section-title{font-family:var(--mono);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-weight:600}
.section-badge{font-family:var(--mono);font-size:.67rem;padding:.22rem .7rem;border-radius:20px;letter-spacing:.06em;white-space:nowrap}
.badge-ok{background:var(--green-lt);color:var(--green)}.badge-warn{background:var(--amber-lt);color:var(--amber)}.badge-alert{background:var(--red-lt);color:var(--red)}.badge-info{background:var(--blue-lt);color:var(--blue)}.badge-gold{background:var(--gold-lt);color:var(--gold-dim)}
.alert-strip{display:flex;gap:.6rem;flex-wrap:wrap;padding:.65rem 1.4rem;border-bottom:1px solid var(--border);min-height:42px;align-items:center}
.alert-chip{display:flex;align-items:center;gap:.35rem;padding:.25rem .7rem;border-radius:20px;font-family:var(--mono);font-size:.6rem;letter-spacing:.05em;font-weight:500}
.alert-chip.warn{background:var(--amber-lt);color:var(--amber);border:1px solid rgba(180,83,9,.2)}
.alert-chip.alert{background:var(--red-lt);color:var(--red);border:1px solid rgba(185,28,28,.2)}
.alert-chip.ok{background:var(--green-lt);color:var(--green);border:1px solid rgba(21,128,61,.2)}
.alert-chip.info{background:var(--blue-lt);color:var(--blue);border:1px solid rgba(29,78,216,.2)}
.date-nav{display:flex;align-items:center;gap:.65rem;padding:.875rem 1.4rem;border-bottom:1px solid var(--border);background:var(--cream)}
.date-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--ink3);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.date-btn:hover{border-color:var(--gold);color:var(--gold)}
.date-display{font-family:var(--mono);font-size:.72rem;color:var(--ink);letter-spacing:.05em;min-width:130px}
.date-today-btn{padding:0 .7rem;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--fog);font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.date-today-btn:hover{border-color:var(--gold);color:var(--gold)}
.drill-tab{padding:.3rem .85rem;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--ink3);font-family:var(--mono);font-size:.65rem;letter-spacing:.05em;cursor:pointer;transition:all .15s}
.drill-tab:hover{border-color:var(--gold);color:var(--gold)}
.drill-tab-active{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:600}
.spacer{flex:1}
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-family:var(--mono);font-size:.67rem;letter-spacing:.09em;text-transform:uppercase;color:var(--fog);padding:.85rem 1.25rem;text-align:left;border-bottom:1px solid var(--border);background:var(--cream);white-space:nowrap}
.data-table th.r{text-align:right}
.data-table td{padding:.8rem 1.25rem;font-size:.95rem;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table td.r{text-align:right;font-family:var(--mono);font-size:.88rem}
.data-table td.mono{font-family:var(--mono);font-size:.84rem}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--cream)}
.data-table tr.tot td{font-weight:600;background:var(--cream);border-top:2px solid var(--border)}
.tbl-wrap{overflow-x:auto}
.data-table.sticky-head th{position:sticky;top:0;z-index:2;background:var(--cream)}
.aging-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1px;background:var(--border)}
.aging-cell{background:var(--white);padding:1.25rem 1.4rem}
.aging-co{font-family:var(--mono);font-size:.58rem;letter-spacing:.13em;text-transform:uppercase;color:var(--fog);margin-bottom:.65rem}
.aging-tot{font-family:var(--serif);font-size:1.45rem;color:var(--ink);margin-bottom:.75rem}
.aging-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.35rem}
.aging-lbl{font-family:var(--mono);font-size:.56rem;color:var(--fog);width:48px;flex-shrink:0;letter-spacing:.05em}
.aging-track{flex:1;height:5px;background:var(--paper);border-radius:3px;overflow:hidden}
.aging-fill{height:100%;border-radius:3px;transition:width .6s ease}
.fill-cur{background:var(--green)}.fill-30{background:var(--amber)}.fill-60{background:#f97316}.fill-90{background:var(--red)}.fill-120{background:#991b1b}.fill-150{background:#4c0519}
.aging-val{font-family:var(--mono);font-size:.58rem;color:var(--ink3);width:70px;text-align:right;flex-shrink:0}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:2.25rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--cream);position:relative}
.upload-area:hover,.upload-area.dragover{border-color:var(--gold);background:rgba(201,151,58,.03)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:1.8rem;margin-bottom:.6rem;opacity:.4}
.upload-title{font-family:var(--mono);font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:.3rem}
.upload-sub{font-size:.8rem;color:var(--fog)}
.upload-results{margin-top:1.25rem;display:flex;flex-direction:column;gap:.45rem}
.upload-item{display:flex;align-items:center;gap:.65rem;padding:.65rem .9rem;background:var(--white);border:1px solid var(--border);border-radius:8px}
.upload-item-name{flex:1;font-family:var(--mono);font-size:.68rem;color:var(--ink3)}
.upload-item-type{font-family:var(--mono);font-size:.57rem;padding:.13rem .5rem;border-radius:20px;letter-spacing:.05em}
.type-ok{background:var(--green-lt);color:var(--green)}.type-unk{background:var(--amber-lt);color:var(--amber)}.type-err{background:var(--red-lt);color:var(--red)}
.upload-item-note{font-family:var(--mono);font-size:.6rem;color:var(--fog)}
.upload-commit{margin-top:1.1rem;padding:.8rem 1.75rem;background:var(--ink);color:var(--gold);border:none;border-radius:8px;font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.upload-commit:hover{background:var(--ink2)}
.upload-commit:disabled{opacity:.4;cursor:not-allowed}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:.9rem;padding:1.4rem}
.form-group{display:flex;flex-direction:column;gap:.35rem}
.form-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fog)}
.form-input{padding:.55rem .7rem;border:1px solid var(--border);border-radius:6px;font-family:var(--mono);font-size:.78rem;background:var(--white);color:var(--ink);transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-actions{padding:0 1.4rem 1.4rem;display:flex;gap:.65rem}
.btn-primary{padding:.6rem 1.4rem;background:var(--ink);color:var(--gold);border:none;border-radius:7px;font-family:var(--mono);font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:var(--ink2)}
.btn-sec{padding:.6rem 1.4rem;background:transparent;color:var(--fog);border:1px solid var(--border);border-radius:7px;font-family:var(--mono);font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-sec:hover{border-color:var(--ink3);color:var(--ink3)}
.btn-delete{background:none;border:1px solid var(--border);border-radius:5px;color:var(--fog);font-size:.65rem;padding:.2rem .5rem;cursor:pointer;transition:all .15s}
.btn-delete:hover{border-color:var(--red);color:var(--red);background:var(--red-lt)}
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 1.4rem;background:var(--cream)}
.tab-btn{padding:.7rem 1.1rem;border:none;background:none;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fog);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn:hover{color:var(--ink3)}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--gold)}
.tab-content{display:none;padding:1.4rem}
.tab-content.active{display:block}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:960px){.two-col{grid-template-columns:1fr}}
/* ── Scrollable tables ── */
.tbl-wrap{overflow-x:auto}
.tbl-scroll{overflow-x:auto;overflow-y:auto;max-height:300px}
/* ── Notes buttons ── */
.notes-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--fog);font-family:var(--mono);font-size:.58rem;letter-spacing:.07em;padding:.18rem .5rem;cursor:pointer;white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;gap:.3rem}
.notes-btn:hover{border-color:var(--gold);color:var(--gold)}
.notes-count{background:var(--gold);color:#fff;border-radius:10px;padding:.05rem .35rem;font-size:.55rem;font-weight:700}
/* ── Mobile responsive ── */
@media(max-width:640px){
  .content{padding:.65rem}
  .page-header{padding:1rem .85rem .75rem}
  .page-title{font-size:1.25rem}
  .page-sub{font-size:.58rem}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:.55rem;margin-bottom:1.25rem}
  .kpi-value{font-size:1.45rem}
  .kpi-label{font-size:.6rem}
  .kpi-meta{font-size:.6rem}
  .kpi-card{padding:.9rem 1rem}
  .section-head{padding:.7rem 1rem;flex-wrap:wrap;gap:.5rem}
  .section-title{font-size:.65rem}
  .data-table th{font-size:.6rem;padding:.55rem .7rem}
  .data-table td{font-size:.8rem;padding:.55rem .7rem}
  .data-table td.r{font-size:.75rem}
  .topbar-nav{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .topbar-nav::-webkit-scrollbar{display:none}
  .nav-btn{white-space:nowrap;font-size:.58rem;padding:.45rem .8rem}
  .date-nav{flex-wrap:wrap;gap:.45rem;padding:.65rem 1rem}
  .date-display{font-size:.68rem;min-width:110px}
  .alert-strip{padding:.5rem 1rem;gap:.4rem}
  .alert-chip{font-size:.58rem;padding:.2rem .55rem}
  .tab-btn{font-size:.58rem;padding:.6rem .8rem}
  .drill-tab{font-size:.6rem;padding:.25rem .65rem}
  .section-badge{font-size:.6rem}
}
@media(max-width:640px){
  .kpi-value{font-size:1.6rem}
  .kpi-label{font-size:.63rem}
  .kpi-card{padding:1.1rem 1.2rem}
  .data-table th{font-size:.6rem;padding:.6rem .75rem}
  .data-table td{font-size:.82rem;padding:.6rem .75rem}
}
.prop-summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.25rem;margin-bottom:1.75rem}
.prop-summary-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:all .2s}
.prop-summary-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.psc-header{padding:.875rem 1.25rem;display:flex;align-items:center;gap:.75rem}
.psc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-wkfcw{background:#3b82f6}.dot-rdurm{background:#22c55e}.dot-rdutt{background:#f59e0b}
.psc-name{font-weight:600;font-size:.9rem}
.psc-code{font-family:var(--mono);font-size:.58rem;color:var(--fog);letter-spacing:.1em}
.psc-body{padding:1rem 1.25rem;border-top:1px solid var(--border)}
.psc-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.75rem}
.psc-kpi{text-align:center}
.psc-kpi-val{font-family:var(--serif);font-size:1.2rem;color:var(--ink)}
.psc-kpi-lbl{font-family:var(--mono);font-size:.52rem;color:var(--fog);letter-spacing:.08em;text-transform:uppercase}
.psc-footer{padding:.65rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.psc-foot-lbl{font-family:var(--mono);font-size:.58rem;color:var(--fog);letter-spacing:.08em}
.psc-foot-val{font-family:var(--mono);font-size:.7rem;font-weight:500;color:var(--ink3)}
.psc-coming{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--fog);font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase}
.pill{display:inline-block;padding:.12rem .5rem;border-radius:20px;font-family:var(--mono);font-size:.56rem;letter-spacing:.05em;font-weight:500}
.pill-red{background:var(--red-lt);color:var(--red)}.pill-green{background:var(--green-lt);color:var(--green)}.pill-amber{background:var(--amber-lt);color:var(--amber)}.pill-blue{background:var(--blue-lt);color:var(--blue)}.pill-gray{background:var(--paper);color:var(--fog);border:1px solid var(--border)}.pill-gold{background:var(--gold-lt);color:var(--gold-dim)}
.month-bar{display:inline-block;height:7px;background:var(--gold);border-radius:2px;opacity:.65;vertical-align:middle}
.empty{text-align:center;padding:2.5rem 2rem;color:var(--fog)}
.empty-icon{font-size:2rem;margin-bottom:.75rem;opacity:.3}
.empty-title{font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.4rem;color:var(--ink3)}
.empty-sub{font-size:.82rem;color:var(--fog)}
.loading{display:flex;align-items:center;gap:.5rem;padding:1.75rem;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;color:var(--fog)}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease infinite}
.pdot:nth-child(2){animation-delay:.2s}.pdot:nth-child(3){animation-delay:.4s}
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center}
.coming-soon-badge{font-family:var(--mono);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.3rem .9rem;border-radius:20px;background:var(--amber-lt);color:var(--amber);margin-bottom:1.25rem}
.coming-soon-title{font-family:var(--serif);font-size:1.5rem;color:var(--ink);margin-bottom:.5rem}
.coming-soon-sub{font-size:.85rem;color:var(--fog);max-width:360px}
#toast{position:fixed;bottom:1.75rem;right:1.75rem;padding:.8rem 1.1rem;border-radius:8px;font-family:var(--mono);font-size:.67rem;letter-spacing:.05em;box-shadow:var(--shadow-lg);z-index:999;transform:translateY(80px);opacity:0;transition:all .3s ease;max-width:300px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:var(--ink);color:var(--gold)}
#toast.error{background:#2d0b0b;color:#f87171}
#toast.info{background:#0f172a;color:#93c5fd}

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const SUPABASE_URL = 'https://ltbjavxegskmhyjqpext.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0YmphdnhlZ3NrbWh5anFwZXh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MTU5NzksImV4cCI6MjA5NjI5MTk3OX0.mE-bSDLH7K9UXTqKDQKOuiEy9gv6Qi1xRj9Q2a9gw6I';
const VERIFY_PIN_URL = 'https://ltbjavxegskmhyjqpext.supabase.co/functions/v1/verify-pin';
const TACK_URL   = 'https://hk.milkamhospitality.com';
const TACK_SB    = 'https://prhsllifpfacvdlttyuf.supabase.co';
const TACK_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByaHNsbGlmcGZhY3ZkbHR0eXVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTIxMTEsImV4cCI6MjA5MjM4ODExMX0._L65_b255yRPZ5d1A0i4rtcLO8NxmnokAwQ4grCMytk';
const EDGE_FN_URL = 'https://ltbjavxegskmhyjqpext.supabase.co/functions/v1/process-night-audit';
const PROPS = {
  WKFCW:{ name:'Candlewood Suites Wake Forest', short:'Candlewood WF', pms:'HotelKey', active:true },

};

// Local-timezone date string (YYYY-MM-DD) — avoids the UTC-shift bug where
// toISOString() rolls the date forward/back near midnight in non-UTC zones.
const localISODate=d=>{ const dt=d||new Date(); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); };

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
const localYesterday=()=>localISODate(new Date(Date.now()-864e5));
let S ={ mode:null, currentDate:localYesterday(), daily:{}, ar:[], arActivity:[], overrides:[], adjs:[], inhouse:[], monthly:[], clerkActivity:[], userActivity:[], adjActivity:[], lineItems:[], pending:[], charts:{}, drillProp:null, drillView:'summary' };
// Returns the property to use for building any view — drillProp overrides mode when set
function vp(){ return S.drillProp||S.mode; }

// ═══════════════════════════════════
// SUPABASE
// ═══════════════════════════════════
const sbHeaders = { 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json' };
async function sbGet(table, qs=''){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${qs}`, {headers:sbHeaders});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(table, data, conflict){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?on_conflict=${conflict}`, {
    method:'POST', headers:{...sbHeaders,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify(Array.isArray(data)?data:[data])
  });
  if(!r.ok) throw new Error(await r.text());
}
async function sbPost(table, data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:'POST', headers:{...sbHeaders,'Prefer':'return=minimal'},
    body:JSON.stringify(Array.isArray(data)?data:[data])
  });
  if(!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, filter){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
    method:'DELETE', headers:{...sbHeaders,'Prefer':'return=minimal'}
  });
  if(!r.ok) throw new Error(await r.text());
}

// ═══════════════════════════════════
// PIN / ENTRY
// ═══════════════════════════════════
let pinEntry='', pinTarget=null;

document.getElementById('prop-selector').addEventListener('click', e=>{
  const btn = e.target.closest('.prop-btn');
  if(!btn) return;
  pinTarget = btn.dataset.prop;
  document.getElementById('pin-for-label').textContent = pinTarget==='OWNER' ? 'Owner View' : (PROPS[pinTarget]?.short || pinTarget);
  document.getElementById('prop-selector-wrap').style.display='none';
  document.getElementById('pin-screen').classList.add('show');
  pinEntry=''; updateDots();
});

document.getElementById('pin-back-btn').addEventListener('click', ()=>{
  document.getElementById('pin-screen').classList.remove('show');
  document.getElementById('prop-selector-wrap').style.display='';
  pinEntry=''; updateDots();
});

document.getElementById('pin-pad').addEventListener('click', e=>{
  const btn = e.target.closest('.pin-key');
  if(!btn) return;
  handlePinKey(btn.dataset.k);
});

document.addEventListener('keydown', e=>{
  if(!document.getElementById('pin-screen').classList.contains('show')) return;
  if(e.key>='0'&&e.key<='9') handlePinKey(e.key);
  else if(e.key==='Backspace') handlePinKey('del');
  else if(e.key==='Escape') handlePinKey('clr');
});

let pinChecking=false;
function handlePinKey(k){
  if(pinChecking) return;
  if(k==='clr'){pinEntry='';updateDots();return}
  if(k==='del'){pinEntry=pinEntry.slice(0,-1);updateDots();return}
  if(pinEntry.length>=4) return;
  pinEntry+=k; updateDots();
  if(pinEntry.length===4){
    pinChecking=true;
    fetch(VERIFY_PIN_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY},body:JSON.stringify({property:pinTarget,pin:pinEntry})})
      .then(r=>r.json())
      .then(data=>{ if(data.valid) enterApp(pinTarget); else { pinError(); pinChecking=false; } })
      .catch(()=>{ pinError(); pinChecking=false; });
  }
}
function updateDots(){
  for(let i=0;i<4;i++) document.getElementById('pd'+i).className='pin-dot'+(i<pinEntry.length?' filled':'');
}
function pinError(){
  for(let i=0;i<4;i++) document.getElementById('pd'+i).className='pin-dot error';
  document.getElementById('pin-err').classList.add('show');
  setTimeout(()=>{ pinEntry=''; pinChecking=false; updateDots(); document.getElementById('pin-err').classList.remove('show'); },800);
}
function enterApp(mode){
  pinChecking=false; pinEntry=''; // reset before entering so switch works cleanly
  S.mode=mode;
  document.getElementById('entry-screen').classList.add('hidden');
  setTimeout(()=>document.getElementById('entry-screen').style.display='none',450);
  document.getElementById('app').classList.add('visible');
  buildAppShell();
  loadAllData().then(renderCurrentView);
}

// ═══════════════════════════════════
// APP SHELL
// ═══════════════════════════════════
function buildAppShell(){
  const tag = document.getElementById('topbar-prop-tag');
  if(S.mode==='OWNER'){ tag.textContent='OWNER VIEW'; tag.className='topbar-prop-tag tag-owner'; }
  else { tag.textContent=S.mode; tag.className='topbar-prop-tag tag-'+S.mode.toLowerCase(); }
  const isOwner=S.mode==='OWNER', propActive=S.mode!=='OWNER'&&PROPS[S.mode]?.active;
  let nav='';
  const adminItems = isOwner
    ? [['owner-upload','⬆ Upload'],['history','🕐 History'],['sync-status','🔄 Sync Status'],['switch','⇄ Switch Property']]
    : [['upload','⬆ Upload'],['history','🕐 History'],['sync-status','🔄 Sync Status'],['switch','⇄ Switch Property']];
  const adminHtml=`<div class="admin-wrap" id="admin-wrap">
    <button class="admin-btn" id="admin-btn">⚙ Admin ▾</button>
    <div class="admin-menu" id="admin-menu">${adminItems.map(([v,l])=>`<button class="admin-item" data-aview="${v}">${l}</button>`).join('')}</div>
  </div>`;
  if(isOwner) nav=`<button class="nav-btn active" data-view="owner-coming-soon">Overview</button>${adminHtml}`;
  else if(propActive) nav=`<button class="nav-btn active" data-view="daily">Daily</button><button class="nav-btn" data-view="accountability">Accountability</button><button class="nav-btn" data-view="reconciliation">Reconciliation</button><button class="nav-btn" data-view="reputation">Reputation</button><button class="nav-btn" data-view="housekeeping">HK</button><button class="nav-btn" data-view="ar">AR / Aging</button>${adminHtml}`;
  else nav=`<button class="nav-btn active" data-view="coming-soon">Overview</button>`;
  document.getElementById('topbar-nav').innerHTML=nav;
  // Main nav clicks
  document.getElementById('topbar-nav').addEventListener('click', e=>{
    const btn=e.target.closest('.nav-btn'); if(!btn) return;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    S.drillProp=null; S.drillView='summary'; // exit drill mode when using main nav
    renderView(btn.dataset.view);
  });
  // Admin button toggle
  document.getElementById('admin-btn')?.addEventListener('click', e=>{
    e.stopPropagation();
    document.getElementById('admin-menu').classList.toggle('open');
  });
  // Admin menu item clicks
  document.getElementById('admin-menu')?.addEventListener('click', e=>{
    const item=e.target.closest('.admin-item'); if(!item) return;
    document.getElementById('admin-menu').classList.remove('open');
    const dv=item.dataset.aview;
    if(dv==='lock'||dv==='switch'){ lockApp(); return; }
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    S.drillProp=null; S.drillView='summary';
    renderView(dv);
  });
  // Close admin menu when clicking elsewhere
  document.addEventListener('click', ()=>document.getElementById('admin-menu')?.classList.remove('open'), {once:false});
}
function lockApp(){
  S={mode:null,currentDate:localYesterday(),daily:{},ar:[],arActivity:[],overrides:[],adjs:[],inhouse:[],monthly:[],clerkActivity:[],userActivity:[],adjActivity:[],lineItems:[],pending:[],charts:{},drillProp:null,drillView:'summary'};
  pinEntry=''; pinTarget=null; pinChecking=false;
  document.getElementById('entry-screen').style.display='flex';
  document.getElementById('entry-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('pin-screen').classList.remove('show');
  document.getElementById('prop-selector-wrap').style.display='';
  document.getElementById('app-body').innerHTML='';
  document.getElementById('topbar-nav').innerHTML='';
  updateDots();
}
function renderCurrentView(){
  const active=document.querySelector('.nav-btn.active');
  if(active) renderView(active.dataset.view);
}
function renderView(view){
  const body=document.getElementById('app-body');
  Object.values(S.charts).forEach(c=>{try{c.destroy()}catch(e){}});
  S.charts={};
  if(view==='owner-coming-soon') { body.innerHTML=`<div class="page-header"><div class="page-title">Owner View</div><div class="page-sub">Coming Soon</div></div><div class="content" style="display:flex;align-items:center;justify-content:center;min-height:60vh"><div style="text-align:center;max-width:420px"><div style="font-size:3rem;margin-bottom:1.5rem;opacity:.3">🏗</div><div style="font-family:var(--serif);font-size:1.75rem;color:var(--ink);margin-bottom:.75rem">Owner View Coming Soon</div><div style="font-family:var(--mono);font-size:.75rem;color:var(--fog);line-height:1.7">We're perfecting the operator views first.<br>The owner dashboard will be built once<br>all property-level views are finalized.</div></div></div>`; }
  else if(view==='owner-summary')    { body.innerHTML=buildOwnerSummary(); wireOwnerSummary(); }
  else if(view==='owner-ar')    { body.innerHTML=buildOwnerAR(); }
  else if(view==='owner-performance') { body.innerHTML=buildOwnerPerf(); setTimeout(renderOwnerPerfChart,100); }
  else if(view==='owner-upload'){ body.innerHTML=buildUploadView('OWNER'); wireUploadView('ou'); }
  else if(view==='owner-drill') { body.innerHTML=buildOwnerDrill(); wireOwnerDrill(); }
  else if(view==='owner-accountability') { body.innerHTML=buildOwnerAccountability(); }
  else if(view==='drill-daily') {
    const yesterday=localYesterday();
    const avail=Object.keys(S.daily).filter(k=>k.startsWith(vp()+'_')).map(k=>k.split('_')[1]).filter(d=>d<=yesterday).sort();
    S.currentDate=avail.length?avail[avail.length-1]:yesterday;
    S.drillView='daily';
    body.innerHTML=buildOwnerDrill(); wireOwnerDrill();
    // daily content rendered inside buildOwnerDrill via buildDaily/wireDaily/renderDailyContent
  }
  else if(view==='daily')       {
    // Always open on the most recent night-audit date available (≤ yesterday).
    // Never show today — night audits cover the prior business day.
    const yesterday=localYesterday();
    const avail=Object.keys(S.daily).filter(k=>k.startsWith(vp()+'_')).map(k=>k.split('_')[1]).filter(d=>d<=yesterday).sort();
    S.currentDate=avail.length?avail[avail.length-1]:yesterday;
    body.innerHTML=buildDaily(); wireDaily(); renderDailyContent();
  }
  else if(view==='housekeeping'){ body.innerHTML=buildHK(); renderHKContent(vp()); }
  else if(view==='performance') { body.innerHTML=buildPerformance(); setTimeout(renderPerfCharts,100); }
  else if(view==='ar')          { body.innerHTML=buildAR(); }
  else if(view==='accountability') { body.innerHTML=buildAccountability(); wireAccountability(); }
  else if(view==='reputation')     { body.innerHTML=buildReputation(); }
  else if(view==='reconciliation') { body.innerHTML=buildReconciliation(); wireReconciliation(); }
  else if(view==='history')     { body.innerHTML=buildHistory(); wireHistory(); }
  else if(view==='upload')      { body.innerHTML=buildUploadView('PROP'); wireUploadView('u'); }
  else if(view==='sync-status') { body.innerHTML=buildSyncStatus(); wireSyncStatus(); }
  else if(view==='coming-soon') { body.innerHTML=buildComingSoon(); }
}

// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
async function loadAllData(){
  const prop=S.mode, isOwner=prop==='OWNER', pf=isOwner?'':'&property=eq.'+prop;
  // Core tables — must all succeed
  try {
    const [daily,ar,overrides,adjs,inhouse,monthly,arActivity] = await Promise.all([
      sbGet('daily_revenue','?order=date.desc&limit=400'+pf),
      sbGet('ar_aging','?order=date.desc&limit=120'+pf),
      sbGet('rate_overrides','?order=stay_date.desc&limit=600'+pf),
      sbGet('adjustments','?order=date.desc&limit=600'+pf),
      sbGet('inhouse_balances','?order=date.desc&limit=300'+pf),
      sbGet('monthly_revenue','?order=period_start.asc'+pf),
      sbGet('ar_activity','?order=snapshot_date.desc&limit=2000'+pf)
    ]);
    S.daily={}; daily.forEach(r=>{ S.daily[(r.property||'WKFCW')+'_'+r.date]=r; });
    S.ar=ar; S.overrides=overrides; S.adjs=adjs; S.inhouse=inhouse; S.monthly=monthly;
    S.arActivity=arActivity;
  } catch(e){ console.warn('Core load error:',e); }
  // Activity tables — load independently so a failure here never breaks core views
  try {
    const [clerkActivity,userActivity,adjActivity,lineItems,taxSummary,txNotes,repSnapshots,repReviews,medalliaSurveys,settlements,procTx] = await Promise.all([
      sbGet('clerk_activity','?order=date.desc&limit=2000'+pf),
      sbGet('user_activity','?order=date.desc&limit=3000'+pf),
      sbGet('adjustments_activity','?order=date.desc&limit=1000'+pf),
      sbGet('revenue_line_items','?order=date.desc&limit=2000'+pf),
      sbGet('tax_summary','?order=date.desc&limit=600'+pf),
      sbGet('transaction_notes','?order=created_at.asc&limit=2000').catch(()=>[]),
      sbGet('reputation_snapshots','?order=updated_at.desc').catch(()=>[]),
      sbGet('reputation_reviews','?order=review_date.desc&limit=100').catch(()=>[]),
      sbGet('medallia_surveys','?order=survey_date.desc&limit=200').catch(()=>[]),
      sbGet('settlements','?order=date.desc&limit=3000'+pf).catch(()=>[]),
      sbGet('processor_transactions','?order=batch_date.desc&limit=3000'+pf).catch(()=>[]),
    ]);
    S.clerkActivity=clerkActivity; S.userActivity=userActivity; S.adjActivity=adjActivity; S.lineItems=lineItems; S.taxSummary=taxSummary; S.txNotes=txNotes||[];
    S.repSnapshots=repSnapshots||[]; S.repReviews=repReviews||[]; S.medalliaSurveys=medalliaSurveys||[];
    S.settlements=settlements||[];
    S.procTx=procTx||[];
  } catch(e){ console.warn('Activity load error:',e); }
}

const fmt$=n=>n==null?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct=n=>n==null?'—':Number(n).toFixed(2)+'%';
const fmtN=n=>n==null?'—':Number(n).toLocaleString('en-US');
const fmtDate=d=>{ if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); };
const fmtMonth=d=>{ if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',year:'numeric'}); };
const nextDay=d=>{ const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()+1); return dt.toISOString().slice(0,10); };
const loading=()=>`<div class="loading"><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div><span>Loading...</span></div>`;
const empty=(t,s)=>`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">${t}</div><div class="empty-sub">${s}</div></div>`;
function deltaChip(curr,prev){ if(!curr||!prev||prev===0) return ''; const d=((curr-prev)/Math.abs(prev)*100).toFixed(1); const cls=d>0?'up':d<0?'down':'flat'; const arrow=d>0?'▲':d<0?'▼':'—'; return `<span class="kpi-delta ${cls}">${arrow} ${Math.abs(d)}% vs LY</span>`; }
function toast(msg,type='success'){ const t=document.getElementById('toast'); t.textContent=msg; t.className=`show ${type}`; setTimeout(()=>t.classList.remove('show'),3200); }

function buildOwnerSummary(){
  const today=localISODate(), curMonth=today.slice(0,7), curYear=today.slice(0,4);
  const curYearNum=Number(curYear), curMonthNum=Number(curMonth.slice(5,7));
  const allRows=Object.values(S.daily);
  const mtdAll=allRows.filter(r=>r.date.startsWith(curMonth));

  // MTD figures come from the running monthly_revenue M-T-D row for the
  // current month — this is the authoritative running total kept live by
  // each daily upload (see process-night-audit), so it's accurate even if
  // a day's upload is still pending.
  const curMonthRow=S.monthly.find(r=>r.period_start===curMonth+'-01');
  const mtdRoomRev=curMonthRow?.room_revenue||0;
  const mtdTotalRev=curMonthRow?.total_revenue||0;
  // LY-M-T-D comes straight from the report's own column (captured at parse time —
  // there's no daily history for prior years to derive an equivalent total from).
  const lyMtd=curMonthRow?.ly_mtd_room_revenue||0;

  // YTD figures: sum each finished/in-progress month of the current year
  // from monthly_revenue (the only table that holds the full year's history —
  // daily_revenue only goes back to the start of live daily tracking).
  const ytdMonthly=S.monthly.filter(r=>{ const [y,m]=r.period_start.split('-').map(Number); return y===curYearNum&&m<=curMonthNum; });
  const ytdRoomRev=ytdMonthly.reduce((s,r)=>s+(r.room_revenue||0),0);
  const ytdTotalRev=ytdMonthly.reduce((s,r)=>s+(r.total_revenue||0),0);
  // LY YTD must cover the SAME days as this year's YTD: full LY months before the
  // current month, plus LY-M-T-D for the in-progress month (the report's own
  // "same month last year, through the same day" figure). Including the full LY
  // current month would inflate LY with days that haven't happened yet this year.
  const lyYtdMonthly=S.monthly.filter(r=>{ const [y,m]=r.period_start.split('-').map(Number); return y===curYearNum-1&&m<curMonthNum; });
  const lyYtdRoomRev=lyYtdMonthly.reduce((s,r)=>s+(r.room_revenue||0),0)+(curMonthRow?.ly_mtd_room_revenue||0);

  // AR KPI: all categories (AR + Settlements + Invoices)
  const arAllAR=S.ar; // no category filter — show everything
  const latArDateAll=[...new Set(arAllAR.map(r=>r.date))].sort().reverse()[0]||null;
  const arTotal=latArDateAll?arNetTotal(arAllAR.filter(r=>r.date===latArDateAll)):0;
  const ar90=latArDateAll?arAllAR.filter(r=>r.date===latArDateAll&&r.category==='Accounts Receivables').reduce((s,r)=>s+(r.over_90||0)+(r.over_120||0)+(r.over_150||0),0):0;
  const ovrMTD=S.overrides.filter(r=>r.stay_date?.startsWith(curMonth));

  // Portfolio-level aggregate (active properties only) — average of each
  // property's most-recent-day Occ% / RevPAR, so multi-property owners get
  // a quick read on the whole portfolio without digging into each card.
  const activeCodes=Object.entries(PROPS).filter(([,p])=>p.active).map(([c])=>c);
  const latestByProp=activeCodes.map(code=>{
    const rows=Object.values(S.daily).filter(r=>r.property===code).sort((a,b)=>a.date.localeCompare(b.date));
    return rows[rows.length-1]||null;
  }).filter(Boolean);
  const portfolioOcc=latestByProp.length?latestByProp.reduce((s,r)=>s+(r.occ_pct||0),0)/latestByProp.length:null;
  const portfolioRevPAR=latestByProp.length?latestByProp.reduce((s,r)=>s+(r.revpar||0),0)/latestByProp.length:null;

  // "Data current through" — latest date we actually have a daily snapshot for
  const latestDataDate=allRows.reduce((max,r)=>r.date>max?r.date:max,'');

  const cards=Object.entries(PROPS).map(([code,p])=>{
    if(!p.active) return `<div class="prop-summary-card" data-prop="${code}"><div class="psc-header"><div class="psc-dot dot-${code.toLowerCase()}"></div><div><div class="psc-name">${p.short}</div><div class="psc-code">${code} · ${p.pms}</div></div></div><div class="psc-coming">Coming Soon — ${p.pms} integration pending</div></div>`;
    const rows=Object.values(S.daily).filter(r=>r.property===code).sort((a,b)=>a.date.localeCompare(b.date));
    const lat=rows[rows.length-1];
    const mo=lat?.date.slice(0,7)||'';
    const mtd=rows.filter(r=>r.date.startsWith(mo));
    const mtdR=mtd.reduce((s,r)=>s+(r.room_revenue||0),0);
    const lyR=mtd.reduce((s,r)=>s+(r.ly_room_revenue||0),0);
    const avgOcc=mtd.length?mtd.reduce((s,r)=>s+(r.occ_pct||0),0)/mtd.length:null;
    const avgADR=mtd.length?mtd.reduce((s,r)=>s+(r.adr||0),0)/mtd.length:null;
    const chg=mtdR&&lyR?((mtdR-lyR)/lyR*100).toFixed(1):null;
    const noShows=lat?.no_shows, ooo=lat?.rooms_ooo, walkIns=lat?.walk_ins;
    const opsRow=(noShows!=null||ooo!=null)?`<div style="display:flex;gap:.75rem;font-family:var(--mono);font-size:.6rem;margin-top:.4rem;color:var(--fog)">${ooo!=null?`<span>OOO: <b style="color:${ooo>0?'var(--red)':'var(--ink)'}">${fmtN(ooo)}</b></span>`:''}${noShows!=null?`<span>No Shows: <b style="color:${noShows>0?'var(--amber)':'var(--ink)'}">${fmtN(noShows)}</b></span>`:''}${walkIns!=null?`<span>Walk-ins: <b>${fmtN(walkIns)}</b></span>`:''}</div>`:'';
    return `<div class="prop-summary-card" data-prop="${code}"><div class="psc-header"><div class="psc-dot dot-${code.toLowerCase()}"></div><div><div class="psc-name">${p.short}</div><div class="psc-code">${code} · ${p.pms}</div></div></div><div class="psc-body"><div class="psc-kpi-row"><div class="psc-kpi"><div class="psc-kpi-val">${lat?fmtPct(lat.occ_pct):'—'}</div><div class="psc-kpi-lbl">Today Occ</div></div><div class="psc-kpi"><div class="psc-kpi-val">${lat?fmt$(lat.adr):'—'}</div><div class="psc-kpi-lbl">Today ADR</div></div><div class="psc-kpi"><div class="psc-kpi-val">${fmt$(mtdR||null)}</div><div class="psc-kpi-lbl">MTD Rev</div></div></div>${chg?`<div style="font-family:var(--mono);font-size:.6rem;color:${chg>0?'var(--green)':'var(--red)'}">MTD Rev vs LY: ${chg>0?'+':''}${chg}%</div>`:''} ${opsRow}</div><div class="psc-footer"><span class="psc-foot-lbl">Avg Occ MTD</span><span class="psc-foot-val">${fmtPct(avgOcc)}</span><span class="psc-foot-lbl" style="margin-left:1rem">Avg ADR MTD</span><span class="psc-foot-val">${fmt$(avgADR)}</span></div></div>`;
  }).join('');

  return `<div class="page-header"><div class="page-title">Owner Overview</div><div class="page-sub">All Properties · ${fmtDate(today)}${latestDataDate?` · Data current through ${fmtDate(latestDataDate)}`:''}</div></div>
  <div class="content">
    <div class="kpi-grid">
      <div class="kpi-card gold"><div class="kpi-label">MTD Room / Total Revenue</div><div class="kpi-value">${fmt$(mtdRoomRev||null)}</div><div class="kpi-meta" style="margin-top:-.1rem">${fmt$(mtdTotalRev||null)} total</div>${lyMtd>0?deltaChip(mtdRoomRev,lyMtd):''}<div class="kpi-meta">All active properties</div></div>
      <div class="kpi-card blue"><div class="kpi-label">YTD Room / Total Revenue</div><div class="kpi-value">${fmt$(ytdRoomRev||null)}</div><div class="kpi-meta" style="margin-top:-.1rem">${fmt$(ytdTotalRev||null)} total</div>${lyYtdRoomRev>0?deltaChip(ytdRoomRev,lyYtdRoomRev):''}<div class="kpi-meta">Jan – ${fmtMonth(curMonth+'-01')}</div></div>
      <div class="kpi-card green"><div class="kpi-label">Portfolio Occ% / RevPAR</div><div class="kpi-value">${portfolioOcc!=null?fmtPct(portfolioOcc):'—'}</div><div class="kpi-meta" style="margin-top:-.1rem">${portfolioRevPAR!=null?fmt$(portfolioRevPAR):'—'} RevPAR</div><div class="kpi-meta">Avg across active properties · latest day</div></div>
      <div class="kpi-card ${ar90>50000?'red':'amber'}"><div class="kpi-label">Total AR Outstanding</div><div class="kpi-value">${fmt$(arTotal||null)}</div><div class="kpi-meta">90+ days: ${fmt$(ar90||null)}</div></div>
      <div class="kpi-card amber"><div class="kpi-label">Override Impact MTD</div><div class="kpi-value">${fmt$(ovrMTD.reduce((s,r)=>s+(r.override_amount||0),0)||null)}</div><div class="kpi-meta">${ovrMTD.length} overrides</div></div>
    </div>
    <div class="prop-summary-grid">${cards}</div>
  </div>`;
}

function wireOwnerDrill(){
  document.getElementById('drill-back')?.addEventListener('click',()=>{
    S.drillProp=null; S.drillView='summary';
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.nav-btn[data-view="owner-summary"]')?.classList.add('active');
    renderView('owner-summary');
  });
  // Render summary chart if on summary tab
  if(S.drillView==='summary') setTimeout(()=>renderDrillSummaryChart(S.drillProp),100);
  document.querySelectorAll('.drill-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const dv=btn.dataset.dview; S.drillView=dv;
      if(dv==='daily'){
        const yesterday=localYesterday();
        const avail=Object.keys(S.daily).filter(k=>k.startsWith(S.drillProp+'_')).map(k=>k.split('_')[1]).filter(d=>d<=yesterday).sort();
        S.currentDate=avail.length?avail[avail.length-1]:yesterday;
      }
      const body=document.getElementById('app-body');
      body.innerHTML=buildOwnerDrill(); wireOwnerDrill();
      if(dv==='daily'){ wireDaily(); renderDailyContent(); }
      if(dv==='hk'){ renderHKContent(S.drillProp); }
    });
  });
  // If landing directly on HK tab
  if(S.drillView==='hk') renderHKContent(S.drillProp);
}
function renderDrillSummaryChart(code){
  const ctx=document.getElementById('chart-drill-trend-'+code); if(!ctx) return;
  const rows=Object.values(S.daily).filter(r=>r.property===code).sort((a,b)=>a.date.localeCompare(b.date)).slice(-30);
  if(!rows.length) return;
  const labels=rows.map(r=>{ const d=new Date(r.date+'T00:00:00'); return (d.getMonth()+1)+'/'+(d.getDate()); });
  new Chart(ctx,{type:'bar',data:{
    labels,
    datasets:[
      {label:'Room Revenue',data:rows.map(r=>r.room_revenue||0),backgroundColor:'rgba(201,151,58,0.75)',borderRadius:3},
      {label:'LY Room Rev',data:rows.map(r=>r.ly_room_revenue||0),backgroundColor:'rgba(200,208,220,0.4)',borderRadius:3}
    ]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'DM Mono',size:10}}}},scales:{y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',font:{family:'DM Mono',size:9}},grid:{color:'#e2e0db'}},x:{ticks:{font:{family:'DM Mono',size:9},maxRotation:45},grid:{display:false}}}}});
}

function buildDaily(){
  return `<div class="page-header"><div class="page-title">Daily Operations</div><div class="page-sub">${PROPS[vp()]?.name} · Revenue · Flags</div></div>

    <div class="two-col">
      <div class="section-card"><div class="section-head"><div class="section-title">Month to Date</div><div class="section-badge badge-info" id="mtd-badge">—</div></div><div id="mtd-body">${loading()}</div></div>
      <div class="section-card"><div class="section-head"><div class="section-title">Year to Date</div><div class="section-badge badge-info" id="ytd-badge">—</div></div><div id="ytd-body">${loading()}</div></div>
    </div>
    <div class="section-card"><div class="section-head"><div class="section-title">In-House Guest Balances</div><div style="display:flex;align-items:center;gap:.6rem"><select id="ih-date-sel" style="font-family:var(--mono);font-size:.72rem;background:var(--ink2);color:var(--fog);border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:.2rem .5rem;cursor:pointer"></select><div class="section-badge badge-info" id="ih-badge">—</div></div></div><div id="ih-body">${loading()}</div></div>
  </div>`;
}
function wireDaily(){
  document.getElementById('d-label').textContent=fmtDate(S.currentDate);
  document.getElementById('d-prev').addEventListener('click',()=>{ const d=new Date(S.currentDate+'T00:00:00'); d.setDate(d.getDate()-1); S.currentDate=localISODate(d); document.getElementById('d-label').textContent=fmtDate(S.currentDate); renderDailyContent(); });
  document.getElementById('d-next').addEventListener('click',()=>{ const d=new Date(S.currentDate+'T00:00:00'); d.setDate(d.getDate()+1); S.currentDate=localISODate(d); document.getElementById('d-label').textContent=fmtDate(S.currentDate); renderDailyContent(); });
  document.getElementById('d-today').addEventListener('click',()=>{ const yesterday=localYesterday(); const avail=Object.keys(S.daily).filter(k=>k.startsWith(vp()+'_')).map(k=>k.split('_')[1]).filter(d=>d<=yesterday).sort(); S.currentDate=avail.length?avail[avail.length-1]:yesterday; document.getElementById('d-label').textContent=fmtDate(S.currentDate); renderDailyContent(); });
}
function renderDailyContent(){
  const d=S.currentDate, prop=vp(), row=dailyRow(d,prop);
  const dayOvr=S.overrides.filter(r=>r.stay_date===d&&r.property===prop);
  const dayAdj=S.adjActivity.filter(r=>r.date===d&&r.property===prop);
  const refunds=dayAdj.filter(r=>r.section==='Refunds'||r.section==='Manager Refund');
  const ovrNet=dayOvr.reduce((s,r)=>s+(r.override_amount||0),0);
  const propAR=S.ar.filter(r=>r.property===prop); // all categories
  const latArAlert=[...new Set(propAR.map(r=>r.date))].sort().reverse()[0]||null;
  const latArRows=latArAlert?propAR.filter(r=>r.date===latArAlert):[];
  const arTotal=arNetTotal(latArRows);
  const arSettle=arSettlementsTotal(latArRows);
  const alerts=[];
  if(dayOvr.length) alerts.push(`<div class="alert-chip ${ovrNet<-100?'alert':'warn'}">⚡ ${dayOvr.length} override${dayOvr.length>1?'s':''} — net ${fmt$(ovrNet)}</div>`);
  if(refunds.length) alerts.push(`<div class="alert-chip alert">↩ ${refunds.length} refund${refunds.length>1?'s':''}</div>`);
  if(arTotal>160000) alerts.push(`<div class="alert-chip alert">🏦 AR Total ${fmt$(arTotal)}</div>`);
  if(arSettle>0) alerts.push(`<div class="alert-chip warn">⚠ ${fmt$(arSettle)} Payments Not Applied</div>`);
  if(!alerts.length) alerts.push(`<div class="alert-chip ok">✓ No flags for this date</div>`);
  document.getElementById('d-alerts').innerHTML=alerts.join('');
  document.getElementById('d-src').textContent=row?'Source: HotelKey Daily':'';
  if(row){
    document.getElementById('d-kpis').innerHTML=`
      <div class="kpi-card gold"><div class="kpi-label">Occupancy</div><div class="kpi-value">${fmtPct(row.occ_pct)}</div>${deltaChip(row.occ_pct,row.ly_occ_pct)}<div class="kpi-meta">LY: ${fmtPct(row.ly_occ_pct)}</div></div>
      <div class="kpi-card green"><div class="kpi-label">ADR</div><div class="kpi-value">${fmt$(row.adr)}</div>${deltaChip(row.adr,row.ly_adr)}<div class="kpi-meta">LY: ${fmt$(row.ly_adr)}</div></div>
      <div class="kpi-card blue"><div class="kpi-label">RevPAR</div><div class="kpi-value">${fmt$(row.revpar)}</div><div class="kpi-meta">${fmtN(row.rooms_sold)} / ${fmtN(row.rooms_available)} rooms</div></div>
      <div class="kpi-card gold"><div class="kpi-label">Room Revenue</div><div class="kpi-value">${fmt$(row.room_revenue)}</div>${deltaChip(row.room_revenue,row.ly_room_revenue)}<div class="kpi-meta">LY: ${fmt$(row.ly_room_revenue)}</div></div>
      <div class="kpi-card amber" id="misc-kpi" style="cursor:pointer" title="Click to expand detail"><div class="kpi-label">Misc Revenue <span style="font-size:.55rem;opacity:.6">▼ detail</span></div><div class="kpi-value">${fmt$(row.misc_revenue)}</div><div class="kpi-meta">Total: ${fmt$(row.total_revenue)}</div></div>
      ${(row.rooms_ooo!=null||row.no_shows!=null)?`
      <div style="grid-column:1/-1;font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fog);padding:.25rem 0 0;border-top:1px solid var(--border)">Room Inventory &amp; Activity</div>
      ${row.rooms_total!=null?`<div class="kpi-card blue"><div class="kpi-label">Total Rooms</div><div class="kpi-value">${fmtN(row.rooms_total)}</div><div class="kpi-meta">Sold: ${fmtN(row.rooms_sold)} · Avail: ${fmtN(row.rooms_available)}</div></div>`:''}
      ${row.rooms_ooo!=null?`<div class="kpi-card red" data-daily-modal="ooo" title="Click for room detail"><div class="kpi-label">Out of Order <span style="font-size:.52rem;opacity:.6">▼</span></div><div class="kpi-value">${fmtN(row.rooms_ooo)}</div><div class="kpi-meta">${row.rooms_comp!=null?`Comp: ${fmtN(row.rooms_comp)}`:''}${row.rooms_house!=null?` · House: ${fmtN(row.rooms_house)}`:''}</div></div>`:''}
      ${row.no_shows!=null?`<div class="kpi-card amber" data-daily-modal="noshows" title="Click for guest detail"><div class="kpi-label">No Shows <span style="font-size:.52rem;opacity:.6">▼</span></div><div class="kpi-value">${fmtN(row.no_shows)}</div><div class="kpi-meta">${row.walk_ins!=null?`Walk-ins: ${fmtN(row.walk_ins)}`:''}${row.cancellations!=null?` · Cancels: ${fmtN(row.cancellations)}`:''}</div></div>`:''}
      ${row.tomorrow_arrivals!=null?`<div class="kpi-card green"><div class="kpi-label">Tomorrow Arrivals</div><div class="kpi-value">${fmtN(row.tomorrow_arrivals)}</div><div class="kpi-meta">${row.tomorrow_departures!=null?`Departures: ${fmtN(row.tomorrow_departures)}`:''}
</div></div>`:''}
      `:''}
`;
  } else {
    document.getElementById('d-kpis').innerHTML=`<div style="grid-column:1/-1">${empty('No data for '+fmtDate(d),'Upload the Hotel Statistics report for this date')}</div>`;
  }
  const [yr,mo]=d.split('-');
  const yrNum=Number(yr), moNum=Number(mo);
  // MTD comes straight from the running monthly_revenue M-T-D row for this property
  // + month — the authoritative running total kept live by each daily upload, which
  // also carries the report's own LY-M-T-D figures (captured at parse time, since
  // there's no daily history for prior years to reconstruct an equivalent total).
  const curMonthRow=S.monthly.find(r=>r.property===prop&&r.period_start===`${yr}-${mo}-01`);
  if(curMonthRow){
    const mtdRev=curMonthRow.room_revenue||0, mtdMisc=curMonthRow.misc_revenue||0, mtdTot=curMonthRow.total_revenue||0;
    const lyMtdRev=curMonthRow.ly_mtd_room_revenue;
    document.getElementById('mtd-badge').textContent=curMonthRow.snapshot_date?`Through ${fmtDate(curMonthRow.snapshot_date)}`:'—';
    document.getElementById('mtd-body').innerHTML=`<table class="data-table"><tr><td>Room Revenue</td><td class="r">${fmt$(mtdRev)}</td></tr><tr><td>Misc Revenue</td><td class="r">${fmt$(mtdMisc)}</td></tr><tr class="tot"><td>Total Revenue</td><td class="r">${fmt$(mtdTot)}</td></tr><tr><td>Occupancy</td><td class="r">${fmtPct(curMonthRow.occ_pct)}</td></tr><tr><td>ADR</td><td class="r">${fmt$(curMonthRow.adr)}</td></tr><tr><td>RevPAR</td><td class="r">${fmt$(curMonthRow.revpar)}</td></tr>${lyMtdRev!=null?`<tr><td>LY Room Revenue (same M-T-D)</td><td class="r" style="color:var(--fog)">${fmt$(lyMtdRev)} ${deltaChip(mtdRev,lyMtdRev)}</td></tr>`:''}</table>`;
  } else { document.getElementById('mtd-body').innerHTML=empty('No MTD data',''); document.getElementById('mtd-badge').textContent='—'; }

  // YTD: sum each finished/in-progress month of the current year from monthly_revenue
  // (the only table holding the full multi-year history — daily_revenue only goes
  // back to the start of live daily tracking in June 2026).
  // LY-YTD must cover the SAME days: full LY months BEFORE the current month, plus
  // the current month row's LY-M-T-D (last year's same month through the same day).
  // Summing full LY months m<=moNum would include days that haven't happened yet
  // this year, inflating the LY comparison.
  const ytdMonthly=S.monthly.filter(r=>{ if(r.property!==prop) return false; const [y,m]=r.period_start.split('-').map(Number); return y===yrNum&&m<=moNum; });
  const lyYtdMonthly=S.monthly.filter(r=>{ if(r.property!==prop) return false; const [y,m]=r.period_start.split('-').map(Number); return y===yrNum-1&&m<moNum; });
  if(ytdMonthly.length){
    const ytdRev=ytdMonthly.reduce((s,r)=>s+(r.room_revenue||0),0), ytdMisc=ytdMonthly.reduce((s,r)=>s+(r.misc_revenue||0),0), ytdTot=ytdMonthly.reduce((s,r)=>s+(r.total_revenue||0),0);
    const ytdOcc=ytdMonthly.reduce((s,r)=>s+(r.occ_pct||0),0)/ytdMonthly.length, ytdADR=ytdMonthly.reduce((s,r)=>s+(r.adr||0),0)/ytdMonthly.length;
    const lyYtdRev=lyYtdMonthly.reduce((s,r)=>s+(r.room_revenue||0),0)+(curMonthRow?.ly_mtd_room_revenue||0), lyYtdTot=lyYtdMonthly.reduce((s,r)=>s+(r.total_revenue||0),0)+(curMonthRow?.ly_mtd_total_revenue||0);
    document.getElementById('ytd-badge').textContent=`${ytdMonthly.length} mo · Jan–${fmtMonth(`${yr}-${mo}-01`).split(' ')[0]}`;
    document.getElementById('ytd-body').innerHTML=`<table class="data-table"><tr><td>Room Revenue</td><td class="r">${fmt$(ytdRev)}</td></tr><tr><td>Misc Revenue</td><td class="r">${fmt$(ytdMisc)}</td></tr><tr class="tot"><td>Total Revenue</td><td class="r">${fmt$(ytdTot)}</td></tr><tr><td>Avg Occupancy</td><td class="r">${fmtPct(ytdOcc)}</td></tr><tr><td>Avg ADR</td><td class="r">${fmt$(ytdADR)}</td></tr>${lyYtdRev>0?`<tr><td>LY Room / Total Revenue</td><td class="r" style="color:var(--fog)">${fmt$(lyYtdRev)} / ${fmt$(lyYtdTot)} ${deltaChip(ytdRev,lyYtdRev)}</td></tr>`:''}</table>`;
  } else { document.getElementById('ytd-body').innerHTML=empty('No YTD data',''); document.getElementById('ytd-badge').textContent='0 mo'; }
  // In-House Guest Balances — date selector lets user browse any uploaded snapshot
  const STANDARD_BILLING=['IHG REWARD','CLC','KFLEX','K-FLEX','FLEX'];
  function isStandardBilling(co){if(!co)return true;const u=co.toUpperCase();return STANDARD_BILLING.some(s=>u.includes(s));}
  const propIH=S.inhouse.filter(r=>r.property===prop);
  const ihDates=[...new Set(propIH.map(r=>r.date))].sort((a,b)=>b.localeCompare(a));
  const ihSel=document.getElementById('ih-date-sel');
  if(ihSel){
    const curSelDate=ihSel.value||ihDates[0]||'';
    ihSel.innerHTML=ihDates.length?ihDates.map(dt=>`<option value="${dt}" ${dt===curSelDate?'selected':''}>${fmtDate(dt)}</option>`).join(''):'<option>No data</option>';
    if(!ihSel.dataset.wired){
      ihSel.dataset.wired='1';
      ihSel.addEventListener('change',()=>{ renderIHTable(prop); });
    }
  }
  function renderIHTable(p){
    const selDate=document.getElementById('ih-date-sel')?.value||ihDates[0]||'';
    const rows=propIH.filter(r=>r.date===selDate);
    const flagCount=rows.filter(r=>!isStandardBilling(r.company)).length;
    document.getElementById('ih-badge').textContent=rows.length?`${rows.length} guests · ${fmtDate(selDate)}${flagCount?' · '+flagCount+' flagged':''}`:'—';
    document.getElementById('ih-badge').className=`section-badge ${flagCount?'badge-alert':'badge-ok'}`;
    document.getElementById('ih-body').innerHTML=rows.length
      ?`<div class="tbl-wrap" style="max-height:320px;overflow-y:auto"><table class="data-table sticky-head"><thead><tr><th>Room</th><th>Guest</th><th>Company</th><th>Arrival</th><th>Departure</th><th class="r">Rate</th><th class="r">Balance</th><th>Payment</th></tr></thead><tbody>${rows.sort((a,b)=>(a.room_number||'').localeCompare(b.room_number||'')).map(r=>{const flagRow=!isStandardBilling(r.company);return`<tr style="${flagRow?'background:var(--red-lt)':''}""><td class="mono" style="font-weight:600">${r.room_number||'—'}</td><td style="${flagRow?'color:var(--red);font-weight:600':''}">${r.guest_name||'—'}</td><td>${r.company?`<span class="pill ${flagRow?'pill-red':'pill-blue'}">${r.company}</span>`:'—'}</td><td class="mono" style="font-size:.72rem">${r.arrival_date?fmtDate(r.arrival_date):'—'}</td><td class="mono" style="font-size:.72rem">${r.departure_date?fmtDate(r.departure_date):'—'}</td><td class="r">${(!r.room_rate||r.room_rate===0)?'<span class="pill pill-amber">COMP</span>':fmt$(r.room_rate)}</td><td class="r" style="font-weight:500">${fmt$(r.folio_balance)}</td><td class="mono" style="font-size:.7rem">${r.payment_method||'—'}</td></tr>`;}).join('')}</tbody><tfoot><tr class="tot"><td colspan="6">Total Balance</td><td class="r">${fmt$(rows.reduce((s,r)=>s+(r.folio_balance||0),0))}</td><td></td></tr></tfoot></table></div>`
      :empty('No in-house data','Upload In-House Guest Balances report');
  }
  renderIHTable(prop);
  // Misc Revenue modal — wire click on Misc KPI
  const miscKpi=document.getElementById('misc-kpi');
  if(miscKpi){
    const allMisc=S.lineItems.filter(r=>r.property===prop&&r.date===d&&r.section==='Misc Revenue');
    if(allMisc.length){
      miscKpi.onclick=()=>{
        document.getElementById('daily-modal-title').textContent=`Misc Revenue — ${fmtDate(d)}`;
        document.getElementById('daily-modal-body').innerHTML=`<div class="tbl-wrap"><table class="data-table"><thead><tr><th>Category</th><th class="r">Today</th><th class="r">MTD</th><th class="r">YTD</th></tr></thead><tbody>${allMisc.filter(r=>(r.actual_today||0)!==0||(r.mtd||0)!==0||(r.ytd||0)!==0).sort((a,b)=>(b.actual_today||0)-(a.actual_today||0)).map(r=>`<tr><td style="font-size:.82rem">${r.label||'—'}</td><td class="r mono" style="${(r.actual_today||0)>0?'font-weight:600':'color:var(--fog)'}">${(r.actual_today||0)!==0?fmt$(r.actual_today):'—'}</td><td class="r mono">${(r.mtd||0)!==0?fmt$(r.mtd):'—'}</td><td class="r mono" style="color:var(--fog)">${(r.ytd||0)!==0?fmt$(r.ytd):'—'}</td></tr>`).join('')}</tbody><tfoot><tr class="tot"><td>Total</td><td class="r">${fmt$(allMisc.reduce((s,r)=>s+(r.actual_today||0),0))}</td><td class="r">${fmt$(allMisc.reduce((s,r)=>s+(r.mtd||0),0))}</td><td class="r" style="color:var(--fog)">${fmt$(allMisc.reduce((s,r)=>s+(r.ytd||0),0))}</td></tr></tfoot></table></div>`;
        document.getElementById('daily-modal').style.display='flex';
      };
    } else { miscKpi.style.cursor='default'; }
  }
  // OOO / No Shows modals
  function showDailyModal(title,html){document.getElementById('daily-modal-title').textContent=title;document.getElementById('daily-modal-body').innerHTML=html;document.getElementById('daily-modal').style.display='flex';}
  document.querySelectorAll('[data-daily-modal]').forEach(btn=>{
    const type=btn.dataset.dailyModal;
    btn.style.cursor='pointer';
    btn.onclick=()=>{
      if(type==='ooo'){
        const oooRows=S.userActivity.filter(r=>r.property===prop&&r.date===d&&(r.action||'').toUpperCase().replace(/[_\s]/g,'').includes('OOO'));
        const html=oooRows.length
          ?`<div class="tbl-wrap"><table class="data-table"><thead><tr><th>Room</th><th>Guest</th><th>Action</th><th>User</th></tr></thead><tbody>${oooRows.map(r=>`<tr><td class="mono" style="font-weight:600">${r.room_number||'—'}</td><td>${r.guest_name||'—'}</td><td class="mono" style="font-size:.7rem">${r.action||'—'}</td><td class="mono" style="font-size:.68rem">${r.username||'—'}</td></tr>`).join('')}</tbody></table></div>`
          :`<div style="padding:1.4rem;font-family:var(--mono);font-size:.72rem;color:var(--fog)">No OOO room detail available from activity log for this date. Check HK report for room numbers.</div>`;
        showDailyModal(`Out of Order — ${fmtDate(d)}`,html);
      } else if(type==='noshows'){

          :`<div style="padding:1.4rem;font-family:var(--mono);font-size:.72rem;color:var(--fog)">No guest-level detail found in activity log for this date.</div>`;
        showDailyModal(`No Shows — ${fmtDate(d)}`,html);
      }
    };
  });
}
